<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生命科学概論A 知識確認クイズ</title>
<style>
  :root {
    --ink: #1a2f3a;
    --parchment: #f6f1e4;
    --parchment-deep: #efe6d1;
    --coral: #c0392b;
    --coral-soft: #e8d3ce;
    --sage: #5c7a63;
    --sage-soft: #dde6dd;
    --gold: #b8863f;
    --line: #d9cfb8;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--parchment);
    font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;
    color: var(--ink);
    padding: 32px 16px 64px;
  }

  .wrap { max-width: 640px; margin: 0 auto; }
  .hidden { display: none !important; }

  /* ---------- Masthead ---------- */
  .masthead { text-align: center; margin-bottom: 36px; }
  .masthead-line { height: 1px; background: var(--ink); opacity: 0.8; }
  .eyebrow {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--gold);
    margin: 14px 0 6px;
    font-weight: 600;
  }
  h1 {
    font-size: 34px;
    margin: 4px 0 6px;
    font-weight: 700;
    letter-spacing: 0.04em;
  }
  .subtitle {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 13px;
    color: #5a5044;
    margin-bottom: 14px;
    letter-spacing: 0.02em;
  }

  /* ---------- Cards ---------- */
  .card {
    background: #fffdf8;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 28px 24px;
    box-shadow: 0 1px 0 rgba(26,47,58,0.05), 0 8px 24px rgba(26,47,58,0.06);
  }

  .setup-section { margin-bottom: 26px; }
  .setup-label {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 12px;
    letter-spacing: 0.08em;
    color: #7a7060;
    margin-bottom: 10px;
    font-weight: 600;
  }

  .chip-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 13px;
    padding: 7px 14px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .chip.active { background: var(--ink); color: var(--parchment); border-color: var(--ink); }

  .num-grid { display: flex; gap: 8px; }
  .num-chip {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 13px;
    padding: 9px 16px;
    border-radius: 4px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--ink);
    cursor: pointer;
    flex: 1 1 auto;
  }
  .num-chip.active { background: var(--gold); color: #fff; border-color: var(--gold); }

  .btn-primary {
    width: 100%;
    margin-top: 8px;
    padding: 15px 20px;
    background: var(--ink);
    color: var(--parchment);
    border: none;
    border-radius: 4px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.05em;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .btn-secondary {
    padding: 12px 28px;
    background: var(--ink);
    color: var(--parchment);
    border: none;
    border-radius: 4px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.04em;
    cursor: pointer;
  }
  .btn-secondary:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-ghost {
    padding: 10px 20px;
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 4px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }

  .foot-note {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 11px;
    color: #9a9080;
    text-align: center;
    margin-top: 20px;
    letter-spacing: 0.03em;
  }

  .stats-link-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 18px;
  }

  /* ---------- Quiz ---------- */
  .progress-bar { margin-bottom: 20px; }
  .progress-track {
    height: 4px;
    background: var(--parchment-deep);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill { height: 100%; background: var(--gold); transition: width 0.3s ease; }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 12px;
    color: #7a7060;
    letter-spacing: 0.04em;
  }
  .progress-num { font-weight: 600; }

  .q-tags { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .tag-year {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    background: var(--ink);
    padding: 3px 9px;
    border-radius: 3px;
    letter-spacing: 0.03em;
  }
  .tag-field {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--gold);
    background: transparent;
    border: 1px solid var(--gold);
    padding: 2px 9px;
    border-radius: 3px;
    letter-spacing: 0.03em;
  }
  .tag-multi {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--coral);
    background: var(--coral-soft);
    padding: 3px 9px;
    border-radius: 3px;
    letter-spacing: 0.02em;
  }
  .tag-weak {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: #fff;
    background: var(--coral);
    padding: 3px 9px;
    border-radius: 3px;
    letter-spacing: 0.02em;
  }

  .q-text { font-size: 17px; line-height: 1.75; margin-bottom: 20px; }

  .choice-list { display: flex; flex-direction: column; gap: 9px; margin-bottom: 6px; }
  .choice-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    text-align: left;
    padding: 12px 14px;
    border-radius: 4px;
    border: 1px solid var(--line);
    background: #fffdf8;
    cursor: pointer;
    font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;
    font-size: 14.5px;
    line-height: 1.65;
    color: var(--ink);
    transition: all 0.12s ease;
    width: 100%;
  }
  .choice-row.selected { border-color: var(--ink); background: #f1ece0; }
  .choice-row.correct { border-color: var(--sage); background: var(--sage-soft); }
  .choice-row.wrong { border-color: var(--coral); background: var(--coral-soft); }
  .choice-row.muted { opacity: 0.55; }
  .choice-row:disabled { cursor: default; }

  .bubble {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 12px;
    font-weight: 700;
    border: 1.5px solid var(--ink);
    color: var(--ink);
    margin-top: 1px;
  }
  .bubble.round { border-radius: 50%; }
  .bubble.square { border-radius: 3px; }
  .bubble.b-selected { background: var(--ink); color: var(--parchment); }
  .bubble.b-correct { background: var(--sage); border-color: var(--sage); color: #fff; }
  .bubble.b-wrong { background: var(--coral); border-color: var(--coral); color: #fff; }

  .choice-text { flex: 1; }
  .check-mark { color: var(--sage); font-weight: 700; font-size: 16px; flex-shrink: 0; }
  .x-mark { color: var(--coral); font-weight: 700; font-size: 15px; flex-shrink: 0; }

  .explain-box {
    margin-top: 16px;
    padding: 14px 16px;
    background: #f4efe1;
    border-left: 3px solid var(--gold);
    border-radius: 2px;
  }
  .explain-label {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--gold);
    margin-bottom: 6px;
  }
  .explain-text { font-size: 14px; line-height: 1.8; color: #3a3428; }

  .action-row { margin-top: 20px; display: flex; justify-content: flex-end; }

  /* ---------- Result ---------- */
  .result-header {
    text-align: center;
    margin-bottom: 28px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--line);
  }
  .result-score-row {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 8px;
    margin: 10px 0;
  }
  .result-score-big { font-size: 64px; font-weight: 700; line-height: 1; }
  .result-score-slash { font-size: 22px; color: #7a7060; }
  .result-grade {
    display: inline-block;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 5px 16px;
    border-radius: 999px;
    letter-spacing: 0.05em;
  }
  .grade-a { background: var(--sage-soft); color: var(--sage); }
  .grade-b { background: #e6ecd8; color: #6b7a3d; }
  .grade-c { background: #f3e6c9; color: var(--gold); }
  .grade-d { background: var(--coral-soft); color: var(--coral); }

  .review-label {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: #7a7060;
    letter-spacing: 0.05em;
    margin-bottom: 14px;
  }
  .review-section { margin-bottom: 28px; }
  .review-card {
    background: #fffdf8;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 18px 20px;
    margin-bottom: 14px;
  }
  .review-q { font-size: 15px; line-height: 1.7; margin: 10px 0 12px; }
  .review-answer {
    font-size: 13.5px;
    line-height: 1.7;
    margin-bottom: 10px;
    color: var(--sage);
    font-weight: 600;
  }
  .perfect-box {
    text-align: center;
    padding: 40px 20px;
    font-size: 16px;
    color: var(--sage);
    font-weight: 600;
    margin-bottom: 24px;
  }

  /* ---------- Stats page ---------- */
  .stats-summary {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }
  .stats-box {
    flex: 1;
    background: #fffdf8;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 16px;
    text-align: center;
  }
  .stats-box-num {
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
  }
  .stats-box-label {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 11px;
    color: #7a7060;
    letter-spacing: 0.04em;
  }

  .stat-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: #fffdf8;
    margin-bottom: 8px;
  }
  .stat-row-text { flex: 1; font-size: 13.5px; line-height: 1.6; }
  .stat-row-meta {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 12px;
    color: #7a7060;
    white-space: nowrap;
    text-align: right;
  }
  .stat-bar-bg {
    width: 60px;
    height: 6px;
    background: var(--parchment-deep);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 4px;
    margin-left: auto;
  }
  .stat-bar-fill { height: 100%; border-radius: 3px; }

  .empty-state {
    text-align: center;
    padding: 50px 20px;
    color: #9a9080;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 13px;
    line-height: 1.8;
  }

  .top-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  @media (max-width: 480px) {
    h1 { font-size: 28px; }
    .card { padding: 22px 16px; }
    .result-score-big { font-size: 48px; }
  }
</style>
</head>

[{"year": "2018", "field": "細胞", "q": "以下の文章のうち、間違っているものを選びなさい。", "choices": ["ウイルスは単独では増殖できない。他の細胞に寄生したときのみ増殖できる。", "核酸は蛋白質のアミノ酸配列を決める設計図である。", "原核生物は核及び細胞小器官を持つ。", "遺伝子とタンパク質の仲介にRNAが重要な働きをする。"], "answer": [2], "explain": "原核生物（真正細菌・古細菌）は核も細胞小器官（オルガネラ）も持たない。「原核生物は核及び細胞小器官を持つ」という記述が誤りで、これが原核生物と真核生物を分ける基本的な違い。", "id": "2018_000_9874f56a"}, {"year": "2018", "field": "細胞", "q": "生物の最小機能単位としての細胞に共通する性質として、不適切なものを1つ選びなさい。", "choices": ["遺伝子とタンパク質の仲介にDNAが重要な働きをする。", "細胞の周囲は細胞壁で包まれている。", "栄養源を摂取して、エネルギー源としてアデノシン三リン酸（ATP）をつくる。", "DNAは複製されて次世代に伝えられる。"], "answer": [0, 1], "explain": "遺伝子とタンパク質の仲介をするのはRNAであり、DNAではないため「仲介にDNAが重要」という記述は不適切。また、細胞壁を持つのは植物・菌類・細菌などで、動物細胞の周囲は細胞膜のみなので「細胞の周囲は細胞壁で包まれている」という記述も不適切。", "id": "2018_001_00173872"}, {"year": "2018", "field": "遺伝", "q": "スイートピーの検定交雑（bl/BL × bl/bl）で[BL]:[Bl]:[bL]:[bl] = 205:48:52:195の個体数を得た。組み換え価に関する記述のうち、不適切なものを2つ選びなさい。", "choices": ["この検定交雑における組換え価は25％である。", "50％の組換え価は、2つの遺伝子間の距離が大きく離れていることを意味し、分離比は独立の場合と同じになる。", "2つの遺伝子が非常に近い位置で完全連鎖した場合、表現型[Bl]や[bL]は現れない。", "分離比が1:1:1:1であった場合、組換え価は100％である。"], "answer": [0, 3], "explain": "組換え価＝(組換え型個体数)/(全個体数)×100＝(48+52)/500×100＝20％なので「組換え価は25％である」は誤り。分離比1:1:1:1は独立の法則に従う場合と同じで、組換え価は最大でも50％である（100％にはならない）ため「分離比が1:1:1:1であれば組換え価は100%」も誤り。「50%の組換え価は2つの遺伝子間の距離が大きく離れていることを意味する」、「完全連鎖した場合、組換え型の表現型は現れない」という記述はいずれも正しい。", "id": "2018_002_aa6b08c9"}, {"year": "2018", "field": "細胞", "q": "以下の文章のうち、不適切なものをすべて選びなさい。", "choices": ["コラーゲンは細胞外マトリックスを構成する主要成分の1つであり、脊椎動物において最も豊富に存在するタンパク質である。", "細胞骨格はアクチンフィラメント、微小管、中間径フィラメントに分類され、すべて繊維状のタンパク質からなる。", "接着結合は、隣り合う細胞中のアクチンフィラメントをフィブロネクチンという膜タンパク質を介してつなぎ合わせる。", "インテグリンは、細胞外マトリクスとの結合に二価の金属イオンを必要とする。"], "answer": [2], "explain": "接着結合（アドヘレンスジャンクション）でアクチンフィラメント同士をつなぐ膜タンパク質はカドヘリンであり、フィブロネクチンではない。フィブロネクチンは細胞外マトリックスの成分でインテグリンと結合する。コラーゲンについての記述、細胞骨格の3分類についての記述、インテグリンと二価金属イオンについての記述はいずれも正しい。", "id": "2018_003_450c9e7a"}, {"year": "2018", "field": "代謝", "q": "次の文の中から、最も適切なものを1つ選びなさい。", "choices": ["酸化的リン酸化反応の結果、合成されるのはNADHである。", "解糖系は、すべて可逆的反応で構成された反応系であるという特徴を持つ。", "解糖系では最初にATPを消費するものの、系の後半でエネルギーを産生するため、1分子のグルコースから正味2分子のATPを合成する。", "好気的条件下の細胞において、解糖系に続いて起きるのはTCA回路である。"], "answer": [3], "explain": "好気的条件では解糖系の後、ピルビン酸はミトコンドリアでアセチルCoAに変換されTCA回路に入るという記述が最も適切。酸化的リン酸化で合成されるのはATPであってNADHではない。解糖系はすべてが可逆反応というわけではなく不可逆反応も含まれる。解糖系の前半でATPを消費し後半で産生するという順番を「最初にATPを産生し後半で消費する」のように逆に説明する記述は誤り（正味2分子のATPが得られるという結論自体は正しい）。", "id": "2018_004_8261bf42"}, {"year": "2018", "field": "代謝", "q": "次の文の中から、最も適切なものを1つ選びなさい。", "choices": ["解糖系の反応ステップの最終産物はアセチルCoAである。", "アセチルCoAを生成するに至る栄養素は糖（糖質）であり、脂肪ではない。", "電子伝達系では電子をユビキノンからATP合成酵素へと受け渡すことでATPが合成される。", "電子伝達系では電子がミトコンドリアのマトリックスから膜間腔に移動し蓄積することが駆動力となり、ATPが合成される。"], "answer": [2], "explain": "解糖系の最終産物はピルビン酸であり、アセチルCoAではない。脂肪もβ酸化を経てアセチルCoAを生成するため、アセチルCoAを生む栄養素が糖のみという説明は誤り。電子伝達系で蓄積し駆動力となるのはプロトン（H+）であり電子そのものではない。消去法により「電子をユビキノンからATP合成酵素へ受け渡してATPが合成される」という記述が最も適切とされる。", "id": "2018_005_cccc7bd3"}, {"year": "2018", "field": "生殖・発生", "q": "生殖に関する次の説明の中から、正しいものを1つ選びなさい。", "choices": ["減数分裂の特徴として、2回の分裂の前に減数分裂組換えがおきることがあげられる。", "減数分裂の特徴は、親の遺伝情報と同一の遺伝情報を忠実に次世代に伝えることにある。", "精子の先体はミトコンドリアが融合してできたものであり、受精時に重要な役割を果たす。", "ヒト卵形成過程においては、1個の始原生殖細胞から1個の卵細胞（卵子）しか成熟しない。"], "answer": [0], "explain": "減数分裂第一分裂の前（前期）に組換えが起こるという説明が正しい。「親の遺伝情報と同一の遺伝情報を忠実に次世代に伝える」という説明は誤り（減数分裂は多様性を生む）。精子の先体はゴルジ体由来でありミトコンドリア由来ではない。ヒトの卵形成では1個の始原生殖細胞から最終的に1個の卵子のみが成熟する（残りは極体になる）とする説もあるため年度により正誤が分かれる点に留意。", "id": "2018_006_be662682"}, {"year": "2018", "field": "生殖・発生", "q": "生物の発生に関する次の説明の中から、最も適切なものを1つ選びなさい。", "choices": ["ヒトの皮膚を構成する表皮と真皮は、三胚葉の中でも別の胚葉に由来する。", "造血幹細胞は多能性を持つため、取り出して培養すると三胚葉に分化する。", "ショウジョウバエの前後軸は、受精卵の転写誘導によるギャップ遺伝子群のビコイドとナノスによって決まる。", "ショウジョウバエ胚発生におけるホメオティック遺伝子群の主要な機能は体節の数を決めることである。"], "answer": [0], "explain": "表皮は外胚葉、真皮は中胚葉由来で異なる胚葉に由来するという説明が正しい。造血幹細胞は多能性ではなく限定的な分化能を持つ体性幹細胞である。ビコイド・ナノスは母性因子であり受精卵自身の転写誘導産物ではない。ホメオティック遺伝子群は体節の「数」ではなく体の各部の「性質・機能」を決める。", "id": "2018_007_cb2a78c6"}, {"year": "2018", "field": "進化", "q": "生物の進化に関する次の文の中から、最も適切なものを1つ選びなさい。", "choices": ["生物種の進化的な遠近は、古くは形状的な特徴で判断されてきたが、近年ではDNA配列で解析する。", "古細菌・真正細菌・真核生物のうち、真核生物は進化的には真正細菌よりも古細菌に近い。", "ミトコンドリアも独自のDNAを持っているが、ほぼ意味のない塩基配列でタンパク質はコードされていない。", "ミトコンドリアが母性遺伝であることを利用して、全人類の祖先がひとりのアフリカ人女性であることがわかった。"], "answer": [0], "explain": "生物種の進化的な遠近を近年ではDNA配列で解析するという記述が正しいとされる。「真核生物は真正細菌よりも古細菌に近い」という説自体は実際は妥当とされる説だが、この設問では消去法で別の選択肢が最適解とされる。ミトコンドリアDNAは実際にはタンパク質をコードしているため「ほぼ意味のない塩基配列でタンパク質はコードされていない」という記述は誤り。ミトコンドリア・イブ仮説の説明は一見正しそうだが、この文脈では正解とされない（過去問の出題意図に留意）。", "id": "2018_008_4f29239a"}, {"year": "2018", "field": "進化・起源", "q": "以下の文章のうち、正しいものを2つ選びなさい。", "choices": ["オパーリンは、原始海洋中のタンパク質が二重膜構造を形成してコアセルベートとなり、その中に有機物が取り込まれて最初の生命体が誕生したとの説を唱えた。", "ユーリーとミラーは、無菌化したガラスチューブに水の存在下で長期加熱しながら放電したところ、タンパク質が生ずることを示した。", "ヘッケルは、脊椎動物の咽頭胚の形が種を超えて似通っていることを発見し、これが「発生砂時計モデル」の提唱につながった。", "RNAワールド仮説は、リボザイムやレトロウイルスの逆転写酵素の発見を根拠に、まずRNAが出現したとする仮説であり有力視されている。"], "answer": [2, 3], "explain": "オパーリンの説は「タンパク質の二重膜構造」という説明が不正確（脂質などの有機物のミセル化がコアセルベートの正しい説明）。ユーリー・ミラーの実験で生じたのはアミノ酸であり、タンパク質ではない。ヘッケルの咽頭胚の発見と発生砂時計モデルの説明、RNAワールド仮説についての記述はいずれも正しい。", "id": "2018_009_c9abc7ed"}, {"year": "2018", "field": "進化・起源", "q": "以下の文章のうち、明らかに間違っているものを1つ選びなさい。", "choices": ["生命体を構成する物質の起源には、隕石など宇宙由来説や、海底火山の熱水噴出孔付近で有機分子が作られたとする説がある。", "古細菌、真正細菌、真核生物のうち最初に現れたのは古細菌であり、そこから光合成細菌などの真正細菌と、それを食べる原始真核生物が出現した。", "ミトコンドリアは、酸素を利用してエネルギーを作り出す細菌を原始真核生物が取り込み共生するようになったと考えられ、独自のDNAを持つことが根拠である。", "原始真核生物は光合成細菌を取り込んで生かし続け、これが現在の植物細胞の葉緑体になったと考えられる。"], "answer": [1], "explain": "真正細菌と古細菌はともに原核生物の独立したドメインであり、「真正細菌が古細菌から分岐して出現した」という説明は誤り。両者は共通祖先から独立に分岐したと考えられている。宇宙由来説・熱水噴出孔説、ミトコンドリアの共生説とその根拠、葉緑体の共生説についての記述はいずれも正しい。", "id": "2018_010_17dfabdf"}, {"year": "2018", "field": "代謝", "q": "以下の文章のうち、正しいものを1つ選びなさい。", "choices": ["解糖系はサイトゾルでグルコース1分子からピルビン酸2分子を生じ、差し引き2分子のATPと新たに2分子のNADHを生じる。", "酸素が使えない状況下では、ピルビン酸はアセチルCoAへ変換されTCA回路で完全分解され、NADH8分子・FADH2分子・GTP2分子が作られる。", "電子伝達系はミトコンドリア外膜の複合体でプロトンを外膜の内側から外側にくみ出し、ATPを作る。", "ATPはリボース骨格が歪んでいるためにエネルギーが蓄えられ、グルコース1分子から合計38分子のATPが作られる。"], "answer": [0], "explain": "「解糖系はサイトゾルでグルコース1分子からピルビン酸2分子を生じ、差し引き2分子のATPと新たに2分子のNADHを生じる」が解糖系の正しい要約。「酸素が使えない状況下でTCA回路が回る」という記述は、TCA回路が好気的過程であることと矛盾するため誤り。電子伝達系が組み込まれるのはミトコンドリア内膜であり外膜ではない。ATPのエネルギーはリン酸基間の高エネルギー結合によるものでリボース骨格の歪みによるものではない。", "id": "2018_011_94f5baa8"}, {"year": "2018", "field": "生態系", "q": "次の文章の中で、正しいものをすべて選びなさい。", "choices": ["生態系において従属栄養生物は消費者、独立栄養生物は分解者である。", "食物連鎖により、上位捕食者ほど生物濃縮の濃度係数は大きくなる。", "マメ科植物の根に共生している根粒菌は大気中の窒素からアンモニアを作り、さらにアミノ酸合成できる。", "ニイニイゼミの幼虫とセミタケとの関係は片利共生である。"], "answer": [1, 2], "explain": "独立栄養生物は生産者であり分解者ではないため、「独立栄養生物は分解者である」という記述は誤り。ニイニイゼミの幼虫とセミタケ（冬虫夏草の一種）の関係は寄生であり片利共生ではない。上位捕食者ほど生物濃縮の濃度係数が大きくなるという記述、根粒菌のアンモニア生成とアミノ酸合成についての記述はいずれも正しい。", "id": "2018_012_662fe7af"}, {"year": "2018", "field": "生態系", "q": "次の文章の中で、誤っているものをすべて選びなさい。", "choices": ["湖沼や内湾に大量の窒素・リンが流入すると、アオコや赤潮の発生といった貧栄養化現象がみられる。", "硝化細菌は好気性条件下でアンモニアを亜硝酸や硝酸に酸化し、脱窒素菌は嫌気性条件下で亜硝酸や硝酸を窒素ガスに還元する。", "下水処理場の曝気槽で使われる活性汚泥には、細菌のほかに原生動物や微小後生動物などが含まれ、食物連鎖が成り立っている。", "土壌汚染サイトに栄養物を注入し、土着の有用微生物を活性化させることにより浄化を行う方法をバイオオーギュメンテーションという。"], "answer": [0, 3], "explain": "窒素・リンの過剰流入で起こるのは「富栄養化」であり「貧栄養化」ではないため、この記述は誤り。栄養物注入による浄化はバイオスティミュレーションであり、バイオオーギュメンテーションは微生物（分解者）そのものを投入する方法なので、この2つを取り違えた記述も誤り。硝化細菌・脱窒素菌の条件についての記述、活性汚泥中の食物連鎖についての記述はいずれも正しい。", "id": "2018_013_14d4278e"}, {"year": "2018", "field": "バイオ技術", "q": "次の文章の中で、正しいものをすべて選びなさい。", "choices": ["日本では、食品における遺伝子組み換え作物使用の表示義務は、原料の10%以上を使用した場合に生じる。", "現在、世界的な穀物生産量の伸びは人口増加より小さいために一人当たりの収穫面積は減少している。", "アグロバクテリウム法は、アグロバクテリウムが自分の持つプラスミドDNAの一部を切り離し植物ゲノムに組み込む性質を利用した方法である。", "Btタンパク質を含む食品がヒトや動物にとって無害な理由は、胃酸などの酸性条件下で速やかに分解され無毒化されるからである。"], "answer": [2, 3], "explain": "アグロバクテリウム法とBtタンパク質に関する記述はいずれも正しい。遺伝子組み換え作物の表示義務の基準（10%）は実際の基準（上位3位以内かつ5%以上）とは異なる場合があり、出題年度により正誤判定が分かれるため、この記述と穀物生産量の記述は慎重な検討が必要（本解説ではアグロバクテリウム法とBtタンパク質についての記述を正解とする）。", "id": "2018_014_24449680"}, {"year": "2018", "field": "微生物・発酵", "q": "次の文章の中で、正しいものをすべて選びなさい。", "choices": ["ドイツの化学者コッホは、「白鳥の首フラスコ実験」によって、微生物の自然発生説を否定した。", "納豆菌であるBacillus subtilisは、胞子を形成するため、蒸した熱い大豆と一緒にワラを包み込んでも生き残ることができる。", "放線菌の生産物であるストレプトマイシンは、アミノグリコシド系の抗生物質であり、結核菌を効果的に殺菌する。", "日本酒は、糖化とエタノール発酵を同時に進行させる並行複発酵という発酵方法で製造される。"], "answer": [1, 2, 3], "explain": "白鳥の首フラスコ実験を行い自然発生説を否定したのはフランスの科学者パスツールであり、コッホではないため、この記述は誤り。納豆菌の胞子形成についての記述、ストレプトマイシンについての記述、日本酒の並行複発酵についての記述はいずれも正しい。", "id": "2018_015_773512f9"}, {"year": "2018", "field": "エネルギー・環境", "q": "間違っているものを選びなさい。", "choices": ["再生可能エネルギーとは、植物や微生物など生物を使って再生できるエネルギーのことである。", "メタンハイドレートとは、メタンと水素が作るクラスターのことで、有望なエネルギー資源である。", "メタンは二酸化炭素よりも温暖化係数が高い。", "バイオリファイナリーとはバイオマスを原料として物質変換を行う技術である。"], "answer": [1], "explain": "メタンハイドレートはメタンと「水」が作るクラスター（包接化合物）であり、「水素」ではないため、この記述が誤り。", "id": "2018_016_535d4703"}, {"year": "2018", "field": "エネルギー・環境", "q": "間違っているものを選びなさい。", "choices": ["枯渇性エネルギーの中にはウランは含まれない。", "バイオエネルギーもバイオリファイナリーも経済性、環境破壊や食糧問題を考慮して開発する必要がある。", "有機固体都市ごみや有機固体産業廃棄物はごみなのでバイオマスとはいえない。", "酵母のアルコール発酵によって得られたバイオエタノールを原料にエチレンやプロピレンを合成する技術はバイオリファイナリーに含まれる。"], "answer": [0, 2], "explain": "ウランは枯渇性（有限）の資源エネルギーであり枯渇性エネルギーに含まれるため、「ウランは含まれない」という記述は誤り。有機性の都市ごみ・産業廃棄物もバイオマス資源として扱われるため、「バイオマスとはいえない」という記述も誤り。", "id": "2018_017_7a8022d5"}, {"year": "2018", "field": "医薬", "q": "間違っているものを選びなさい。", "choices": ["低分子医薬品と同様、バイオ医薬品は全く同じであることを保証しなければならない。", "ES細胞もiPS細胞は胚性幹細胞であるが、造血幹細胞は体性幹細胞である。", "DDSとは薬物を標的箇所に運搬して必要なタイミングで放出させるシステムのことである。", "がん組織で亢進している血管透過性を利用するパッシブターゲティングに対して、アクティブターゲティングはがん組織で過剰に発現している受容体に対するリガンドを利用する。"], "answer": [1], "explain": "iPS細胞は「誘導多能性幹細胞」であり体細胞から人工的に作られたもので、ES細胞（胚性幹細胞）とは由来が異なるため、iPS細胞を胚性幹細胞と分類する記述は誤り。", "id": "2018_018_dc9843d7"}, {"year": "2018", "field": "医薬", "q": "間違っているものを選びなさい。", "choices": ["抗体は抗原を認識する機能を持ち、中には薬理作用を示すものもある。", "コンビナトリアルケミストリーとは、薬学と生物学を融合させた化学である。", "受容体に結合してその機能を弱める働きのある薬をアゴニストという。", "ヒト化抗体は完全に人のタンパク質でできた抗体である。"], "answer": [1, 2, 3], "explain": "コンビナトリアルケミストリーは多数の化合物を効率的に合成・評価する化学的手法であり、「薬学と生物学を融合させた化学」という説明は不正確。受容体に結合し機能を弱める薬はアンタゴニスト（拮抗薬）であり、アゴニスト（作動薬）は機能を活性化させる薬なので、この記述も誤り。ヒト化抗体は可変領域の一部がマウス由来など完全にヒト由来ではない（ヒト抗体率は約90〜95%）ため、「完全に人のタンパク質でできた抗体」という記述も誤り。", "id": "2018_019_7582d22a"}, {"year": "2018", "field": "疾患", "q": "以下の文のうち、誤っているものをすべて選びなさい。", "choices": ["がん細胞の特徴として、「高度な分化」、「異常な核」、「血管の新生」、「転移」が挙げられる。", "現代の世界における死亡数を分類した場合、「感染症」が最多である。", "遺伝子治療により先天性遺伝子疾患は遺伝子配列を修正することにより完全に治る病気となった。", "結核はcompromised hostには致命的な病気である。"], "answer": [0, 1, 2], "explain": "がん細胞は「高度な分化」ではなく「未分化」であることが特徴なので、この記述は誤り。世界の死因の最多は「循環器疾患」であり「感染症」ではないため、この記述も誤り。遺伝子治療は発展途上の技術であり、先天性遺伝子疾患を「完全に」治せるとは言えないため、この記述も誤り。結核がcompromised hostに致命的であるという記述は正しい。", "id": "2018_020_1712100d"}, {"year": "2018", "field": "疾患", "q": "以下の問いから間違っているものを1つ選びなさい。", "choices": ["日本人の糖尿病罹患者の約半分は1型糖尿病である。", "米国においては肝臓移植の死体移植の件数は生体移植の件数より多い。", "HIVウイルスはRNAを遺伝子として持っている。", "高血圧、糖尿病、肥満と喫煙習慣は動脈硬化の危険因子である。"], "answer": [0], "explain": "日本人の糖尿病患者の大多数（約9割以上）は2型糖尿病であり、1型糖尿病は少数派なので、「約半分は1型糖尿病である」という記述は誤り。", "id": "2018_021_6dd25611"}, {"year": "2018", "field": "ゲノム", "q": "次の文章の中で、正しいものを1つ選びなさい。", "choices": ["ヒトゲノム解読後、機能を持っている領域は90%以上あることが証明された。", "タンパク質の情報を持たないRNAはノンセンスRNAと呼ばれる。", "1980年代に登場した自動シークエンサーでは、シークエンスシグナルは蛍光であった。", "ヒト全ゲノム解読は5年前に終了した。"], "answer": [2], "explain": "ヒトゲノムで機能を持つ領域は諸説あるが90%以上と証明されたわけではないので、この記述は誤り。タンパク質をコードしないRNAは「ノンコーディングRNA（ncRNA）」と呼ばれ、ノンセンスRNAという呼称ではないため、この記述も誤り。ヒトゲノム解読は2003年に完了しており「5年前」ではないため、この記述も誤り。1980年代の自動シークエンサーでシークエンスシグナルが蛍光であったという記述が正しい。", "id": "2018_022_3f98b1d2"}, {"year": "2018", "field": "ゲノム", "q": "間違っている文を1つ選択しなさい。", "choices": ["ヒトゲノムでタンパク質をコードする領域であるイントロンはわずかに1.5％程度である。", "miRNAはmRNAと結合することにより遺伝子発現を調節する。", "個別化医療では、遺伝子情報をもとに効果のある患者のみに投薬することが可能になる。", "non-coding RNA (ncRNA)としてrRNA、tRNA、endogenous siRNAなどが知られている。"], "answer": [0], "explain": "タンパク質をコードする領域は「エクソン」であり、「イントロン」は非コード領域（スプライシングで除去される部分）である。この用語の取り違えが誤り。", "id": "2018_023_1b645cf7"}, {"year": "2018", "field": "ゲノム", "q": "間違っている文を1つ選択しなさい。", "choices": ["セントラルドグマにより、1つの遺伝子からは1種類のタンパク質が作られる。", "ヒトゲノムの配列には0.1%程度の個人差があり、主なものは一塩基多型（SNP）である。", "miRNAは約23塩基という非常に短いRNAである。", "ヒトでは1000万以上のSNPが作られている（知られている）。"], "answer": [0], "explain": "選択的スプライシングにより、1つの遺伝子から複数種類のタンパク質（アイソフォーム）が作られ得るため、「1つの遺伝子から1種類のタンパク質が作られる」という記述は誤り。", "id": "2018_024_d7f70154"}, {"year": "2019", "field": "化学基礎", "q": "以下の文章のうち間違っているものを選びなさい。", "choices": ["真核生物では、細胞は細胞膜によって外界と隔てられ、細胞内にも膜によって仕切られたオルガネラが存在している。", "動物、植物に感染するウイルスと比較して細菌に感染するものをバクテリオファージと呼ぶ。", "1990年にウーズにより、真核生物を1つのドメインとし、モネラ界を2つのドメインに分ける3ドメイン説が提唱された。", "糖類は単糖がホスホジエステル結合により連結した重合体である。"], "answer": [3], "explain": "単糖同士を連結する結合はグリコシド結合であり、ホスホジエステル結合は核酸のヌクレオチド同士を連結する結合であるため、糖類の重合体についての記述が誤り。", "id": "2019_025_0ee8c3d9"}, {"year": "2019", "field": "生化学", "q": "以下の文章のうち間違っているものを選びなさい。", "choices": ["20種類のアミノ酸の中でグリシン以外のアミノ酸はキラリティを有している。", "赤血球表面の糖鎖の違いは血液型の違いとしてよく知られている。", "核酸の糖の構成成分がデオキシリボースでできたものをRNAという。", "タンパク質は細胞を構成するだけでなく、酵素、ホルモン、受容体など多彩な機能を持つ生体の機能分子である。"], "answer": [2], "explain": "糖の構成成分がデオキシリボースであるものはDNA、リボースであるものがRNAである。「核酸の糖の構成成分がデオキシリボースでできたものをRNAという」という記述は、deoxy（デオキシ）とribo（リボ）の対応を取り違えており誤り。", "id": "2019_026_f3bc788b"}, {"year": "2019", "field": "遺伝", "q": "エンドウマメの交配実験（親1×親2、種子の色P/p・形Q/q）に関する記述で、次の中から正しいものを1つ選びなさい。", "choices": ["親1の遺伝子型の如何に関わらず、F1の形質はすべて顕性の形質を示す。", "F1の色と形に注目して「黄色丸形:緑色丸形=1:1」であれば、親1の遺伝子型はPp/QQであったといえる。", "F1の形にのみ注目して「丸形:しわくちゃ=1:1」であれば、親1の遺伝子型はPp/Qqであったといえる。", "種子の色と形について親1の遺伝子型を決定するには、F1世代の表現型観察結果では不十分であり、検定交雑によりF2世代を作り観察する必要がある。"], "answer": [1], "explain": "親1がPp/QQなら配偶子はPQ:pQ=1:1となり、黄丸:緑丸=1:1という観察結果と一致するため、この記述が正しい。「親1の遺伝子型の如何に関わらずF1はすべて顕性を示す」は親1がPp/Qqなら顕性の出現率は25%等となるため誤り。「丸形:しわくちゃ=1:1であれば親1の遺伝子型はPp/Qq」という記述はPP/Qqでも同じ表現型比になるため一意に決定できず誤り。この検定交雑自体がF1の観察で親1の遺伝子型を決定する方法であり、色と形の両方に注目すれば既に決定可能なため、「F2世代を作り観察する必要がある」という記述も誤り。", "id": "2019_027_f5ac9d08"}, {"year": "2019", "field": "遺伝", "q": "遺伝に関する下記の文の中から、もっとも適切なものを一つ選びなさい。", "choices": ["連鎖する2遺伝子間の組換え価(%)の最大値は、生じる4個の配偶子のうち4個で組換えが見られる場合があるため100となる。", "連鎖する2遺伝子間の組換えは、2遺伝子の物理的距離が長いときが短いときよりも、より高頻度で起きる。", "ヒトのある形質を示す遺伝子が22番染色体上に存在する場合、性別と連鎖する伴性遺伝を示す。", "ヒトの2つの遺伝子が連鎖する場合、親が顕す2つの形質が子で顕されなかった場合、その親が作った配偶子内で2遺伝子間に組換えが起きていたことを示している。"], "answer": [1], "explain": "組換え価の最大値は50%（独立の法則に従う場合と同じ）であり100にはならないため、「最大値は100となる」という記述は誤り。性染色体は23番目であり、22番染色体は常染色体なので伴性遺伝にはならないため、この記述も誤り。連鎖する2つの形質が子に顕れなくても、両親がともにヘテロ接合体でab配偶子同士が受精すれば組換えなしでもその子には両形質とも顕れないため、「組換えが起きていたことを示している」という記述も必ずしも正しいとは言えず誤り。「物理的距離が長いときの方が組換えが高頻度で起きる」という記述が正しい。", "id": "2019_028_39be44b3"}, {"year": "2019", "field": "細胞", "q": "生物の進化に関する次の文の中から、誤りがあるものを一つ選びなさい。", "choices": ["原核細胞は、真核細胞とは異なり、核膜と細胞小器官をもたない。", "最も細い直径をもつ細胞骨格は、アクチンフィラメントである。", "核とミトコンドリア、および葉緑体は、脂質二重層の生体膜を2重にもつ。", "隣り合う2細胞間の結合には、密着結合、デスモソーム、ギャップ結合があり、アクチンフィラメントが関与する接着結合は細胞間結合には含まれない。"], "answer": [3], "explain": "接着結合（アドヘレンスジャンクション）はアクチンフィラメントが関与する重要な細胞間結合の一種であり、「細胞間結合には含まれない」という記述は誤り。実際には含まれる。", "id": "2019_029_f2fa85a7"}, {"year": "2019", "field": "細胞", "q": "生物の進化に関する次の文の中から、最も適切なものを一つ選びなさい。", "choices": ["細胞は、独立して生命活動をおこなうことができる最小単位である。", "ゴルジ体は、核膜の外膜とつながる膜系の細胞小器官である。", "細胞外マトリックスは、細胞の性質には影響を与えない。", "動物の組織は上皮組織、神経組織、支持組織、筋組織に分類される。神経組織は情報伝達を担う神経細胞のみから構成される。"], "answer": [0], "explain": "細胞は生命の最小機能単位であるという記述が正しい。ゴルジ体は核膜とは独立した膜系で直接つながってはいないため、「核膜の外膜とつながる」という記述は誤り。細胞外マトリックスは細胞の接着・増殖・分化など性質に影響を与えるため、「性質には影響を与えない」という記述も誤り。神経組織は神経細胞に加えグリア細胞（支持細胞）からも構成されるため、「神経細胞のみから構成される」という記述も誤り。", "id": "2019_030_d4113bd2"}, {"year": "2019", "field": "細胞", "q": "次の文の中から、最も適切なものを選びなさい。", "choices": ["真核細胞のなかでは、細胞壁をもつ生物は植物界に分類される。", "ゴルジ体ではタンパク質に多数のユビキチン付加がおこなわれる。", "間期の真核細胞では、染色体は高度に凝縮されておりX字のように染色される。", "細胞外に排出されるタンパク質は小胞輸送経路により、小胞体からゴルジ体を経由して細胞膜に到達する。"], "answer": [3], "explain": "細胞壁を持つのは植物界だけでなく菌類なども含むため、「細胞壁をもつ生物は植物界に分類される」という記述は誤り。ゴルジ体で行われるのは主に糖鎖付加であり、ユビキチン付加ではないため、この記述も誤り。染色体が高度に凝縮しX字に見えるのは分裂期であり間期ではないため、この記述も誤り。分泌タンパク質が小胞体からゴルジ体を経て細胞膜に到達するという記述が正しい。", "id": "2019_031_57391cf0"}, {"year": "2019", "field": "代謝", "q": "次の文の中から、最も適切なものを一つ選びなさい。", "choices": ["解糖系の反応ステップの最終産物はアセチルCoAである。", "アセチルCoAを生成するに至る栄養素は糖（糖質）であり、脂肪ではない。", "電子伝達系では電子をユビキノンからATP合成酵素へと受け渡すことでATPが合成される。", "電子伝達系では電子がミトコンドリアのマトリックスから膜間腔に移動し蓄積することが駆動力となり、ATPが合成される。"], "answer": [2], "explain": "解糖系の最終産物はピルビン酸であり、アセチルCoAではないため誤り。脂肪もアセチルCoAの供給源となるため、糖のみという説明も誤り。駆動力となり蓄積するのはプロトンであり電子そのものではないため、この記述も誤り。消去法により「電子をユビキノンからATP合成酵素へ受け渡してATPが合成される」が正解とされる。", "id": "2019_032_3c056194"}, {"year": "2019", "field": "代謝", "q": "以下の文章のうち、間違っているものを2つ選びなさい。", "choices": ["解糖系は酸素の有無にかかわらずサイトゾルで1分子のグルコースから2分子のピルビン酸を生じる。前半で1分子のグルコースから4分子のATPが産生され、後半で2分子のNADHが作られる一方ATPが2分子消費され、差し引き2分子のATPが産生される。", "酸素が使える状況下では、ピルビン酸はまずアセチルCoAへ変換され、TCA回路で二酸化炭素に完全分解される。ピルビン酸1分子あたり新たに4分子のNADH、FADH2とGTPがそれぞれ1分子ずつ作られ、経路全体ではNADH8分子、FADH2分子、GTP2分子が作られる。", "電子伝達系はミトコンドリア内膜に組み込まれた5つのタンパク質複合体から構成され、その一部はNADHを用いてミトコンドリアの内側から外側にプロトンをくみ出しプロトン勾配を作る。プロトンが内側に流れ込む際にATP合成酵素を動かし酸化的リン酸化によりATPを作り出す。NADH1分子当たりATPは3分子作られる。", "ATPは5つの炭素が環状に結合したリボース骨格が歪んでいるためにエネルギーが蓄えられている。GTPも同じ構造をもつためエネルギー的にはGTPはATPと等価と考えてよく、グルコース1分子から解糖系・TCA回路・電子伝達系・酸化的リン酸化を経て合計38分子のATPが作られる。"], "answer": [0], "explain": "解糖系の前半は実際にはATPを「消費」する段階、後半でATPとNADHを「産生」する段階であり、「前半で4分子のATPが産生され後半で2分子消費される」という説明は前半・後半の説明が実際と逆になっている点で誤り（最終的な差し引き2分子という結論は正しいが過程の説明が誤り）。TCA回路の生成物の数についての記述、電子伝達系の内膜での働きについての記述は概ね正しい記述とされる（この設問は2つ選ぶ形式だが、ATPのエネルギー貯蔵機構をリボース骨格の歪みで説明する記述も実際には不正確な点を含む。過去問の解答例では前半・後半の説明のみが明確な誤りとして挙げられている）。", "id": "2019_033_6e008c64"}, {"year": "2019", "field": "生殖", "q": "生殖に関する次の説明の中から、正しいものを一つ選びなさい。", "choices": ["減数分裂においては、2回の分裂のあいだの時期に減数分裂組換えが起きる。", "減数分裂の特徴は、親の遺伝情報と同一の遺伝情報を忠実に次世代に伝えることにある。", "精子の先体はミトコンドリアが融合してできたものであり、受精時に重要な役割を果たす。", "ヒト卵形成過程においては、1個の始原生殖細胞から1個の卵細胞(卵子)しか成熟しない。"], "answer": [3], "explain": "組換えは第一分裂の前（前期）に起こり、2回の分裂の間ではないため、「2回の分裂のあいだの時期に組換えが起きる」という記述は誤り。減数分裂は組換えなどにより多様性を生み出す過程なので、「同一の遺伝情報を忠実に伝える」という記述も誤り。精子の先体はゴルジ体由来でありミトコンドリア由来ではないため、この記述も誤り。ヒトの卵形成では不等分裂により1個の始原生殖細胞から最終的に1個の卵子のみが成熟し、残りは極体となって消失するため、「1個の卵細胞しか成熟しない」という記述が正しい。", "id": "2019_034_41490674"}, {"year": "2019", "field": "発生", "q": "生物の発生に関する次の説明の中から、もっとも適切なものを一つ選びなさい。", "choices": ["ヒトの皮膚を構成する表皮と真皮はいずれも外胚葉に由来する。", "造血幹細胞は多能性をもつため、取り出して培養すると三胚葉に分化する。", "ショウジョウバエの前後軸の決定は、受精卵の転写産物によるものではなく、母性因子のビコイドとナノスの局在化によるものである。", "ショウジョウバエ胚発生におけるホメオティック遺伝子群の主要な機能は体節の数を決めることである。"], "answer": [2], "explain": "表皮は外胚葉、真皮は中胚葉由来であり同じ胚葉ではないため、「いずれも外胚葉に由来する」という記述は誤り。造血幹細胞は多能性ではなく限定的な分化能を持つ体性幹細胞なので、この記述も誤り。ホメオティック遺伝子群は体節の数ではなく各体節の性質（機能）を決定するため、この記述も誤り。ビコイド・ナノスは卵形成時に母親由来のmRNAとして卵内に蓄積される母性因子であるという記述が正しい。", "id": "2019_035_6b710861"}, {"year": "2019", "field": "進化", "q": "生物の進化に関する次の文の中から、最も適切なものを一つ選びなさい。", "choices": ["生命の起源を考える仮説のうち最も有力なのは、DNAワールド仮説である。DNAはセントラルドグマの根幹であることがその根拠となっている。", "ヒトを含む真核生物は、進化的には、古細菌が進化したと考えられる真性細菌に近い。", "現代の遺伝子レベルの解析から、ヘッケルの発生反復説は正しくないことがわかってきた。現在は発生途中の器官形成期がもっとも保存されているという発生砂時計モデルが支持されている。", "遺伝子発現の時間差により発生のタイミングがずれることをヘテロクロニーといい、幼形成熟を行うアホロートルはその一例である。"], "answer": [2], "explain": "生命起源で有力視されているのはRNAワールド仮説であり、DNAワールド仮説ではないため、この記述は誤り。真正細菌は古細菌から進化したものではなく、共通祖先から独立に分岐した系統と考えられているため、この記述も誤り。ヘテロクロニー（発生タイミングの変化）についての記述自体は妥当だが、選択肢の中ではヘッケルの発生反復説と発生砂時計モデルについての記述が最も正確な記述とされる。", "id": "2019_036_943d682c"}, {"year": "2019", "field": "起源", "q": "以下の文章のうち、間違っているものを1つ選びなさい。", "choices": ["ユーリーとミラーは、原始地球に存在すると考えられていたアミノ酸の分子を無菌化したガラスチューブに入れ、水の存在下で長期加熱しながら放電したところ、タンパク質が生ずることを示した。", "原始の地球で、リボザイムやレトロウイルスの逆転写酵素の発見を根拠として、RNAが最初に出現したとするRNAワールド仮説が有力視されている。", "現存生物は古細菌、真正細菌、真核生物の3ドメインに分類され、最初に現れたのは古細菌である。光合成細菌などの真正細菌と、これを食べる原始真核生物はいずれも古細菌が進化して出現した。", "進化の過程で酸素を利用してエネルギーを作り出す細菌が現れ、これを取り込み共生し続けた原始真核生物において、この細菌が細胞小器官のミトコンドリアへと進化したと考えられている。この根拠は、ミトコンドリアが独自のDNAを持つことである。"], "answer": [0], "explain": "ユーリー・ミラーの実験ではガラスチューブに入れたのはメタン・水素・アンモニア・水（原始大気を模した気体）であり、「アミノ酸の分子」を入れたのではない。また生成されたのはアミノ酸であり、タンパク質ではない。この記述は二重に誤っている。", "id": "2019_037_5ffe3d4a"}, {"year": "2019", "field": "遺伝子工学", "q": "大腸菌の細胞内でヒト配列由来のインスリンを合成する場合の作業について、正しいものを一つ選びなさい。", "choices": ["逆転写反応は1本鎖RNAから2本鎖DNAを作製する方法であり、その過程ではDNAでできたプライマーとRNA分解酵素、DNAポリメラーゼが必要になる。", "インスリンのDNAは人の体中のほとんどの細胞が持っているため、採取しやすい口腔上皮細胞からPCRでcDNAを得るのが一般的である。", "制限酵素はDNAを切断する酵素であり、特定の6塩基の真ん中でDNAを切断し、その末端は平滑末端とよばれる。", "一般的なPCR法では、約60℃前後でプライマーを結合させ(アニーリング)、その後72℃前後でDNA合成をおこなうため、この2温度間を交互に繰り返すことでDNAが増幅する。"], "answer": [0], "explain": "逆転写反応（RT-PCR等の逆転写ステップ）は1本鎖RNA（mRNA）を鋳型として2本鎖DNAを作る方法で、DNAプライマー、逆転写酵素（RNA分解活性を伴う逆転写酵素）、DNAポリメラーゼが関わるため、この記述が正しい。インスリン遺伝子は全細胞にあるが「発現」しているのは膵臓であり、mRNAを効率よく得るには発現組織（膵臓）を使うべきで口腔上皮細胞は不適なので、この記述は誤り。制限酵素の切断様式は種類によって異なり、常に平滑末端になるわけではないため、この記述も誤り。PCR法はアニーリング・伸長の2温度だけでなく、94℃前後の熱変性（デネイチャー）を含めた3段階の温度サイクルを繰り返すのが正しいため、「2温度間を交互に繰り返す」という記述も誤り。", "id": "2019_038_fcdd0e8f"}, {"year": "2019", "field": "エネルギー", "q": "間違っているものを選びなさい。", "choices": ["再生可能エネルギーとは、植物や微生物など生物を使って再生できるエネルギーのことである。", "メタンハイドレートとは、メタンと水素が作るクラスターのことで、有望なエネルギー資源である。", "メタンは二酸化炭素よりも温暖化係数が高い。", "バイオエタノールでは、植物による二酸化炭素の吸収、一連の製造や輸送、燃焼による二酸化炭素の排出を計算するとカーボンニュートラルになる。"], "answer": [1], "explain": "メタンハイドレートはメタンと「水」が作るクラスターであり、「水素」ではないため、この記述が明確な誤り。太陽光・風力なども再生可能エネルギーに含まれるため、生物由来のみとする再生可能エネルギーの定義もやや不完全ではある。", "id": "2019_039_a6032e31"}, {"year": "2019", "field": "エネルギー", "q": "間違っているものを選びなさい。", "choices": ["再生可能エネルギーはバイオ燃料や太陽光をエネルギー源としており、水力は含まれない。", "バイオエネルギーやバイオリファイナリーの開発は、環境破壊や食糧問題の解決にもなる。", "バイオマスは、バイオエタノール・バイオディーゼル・バイオガスのことであり、間伐材は含まれない。", "酵母のアルコール発酵によって得られたバイオエタノールを原料にエチレンやプロピレンを合成する技術がある。"], "answer": [0, 1, 2], "explain": "水力発電も再生可能エネルギーに含まれるため、「水力は含まれない」という記述は誤り。バイオエネルギー・バイオリファイナリーの開発は食糧問題や環境破壊の「懸念」が危惧されており、必ずしも解決になるとは言えないため、「解決にもなる」という記述も誤り。間伐材のような木質バイオマスもバイオマス資源に含まれるため、「間伐材は含まれない」という記述も誤り。バイオエタノールからエチレンやプロピレンを合成する技術についての記述は正しい（バイオリファイナリーの一例）。", "id": "2019_040_3aab8659"}, {"year": "2019", "field": "疾患", "q": "以下の文のうち、誤っているものを全て選びなさい。", "choices": ["がん細胞の特徴として、「高度な分化」、「異常な核」、「血管の新生」、「転移」が挙げられる。", "現代の世界における死亡数を分類した場合、「がん」が最多である。", "エイズはcompromised hostの原因である。", "遺伝子治療により先天性遺伝子疾患は遺伝子配列を修正することにより完全に治る病気となった。"], "answer": [0, 1, 3], "explain": "がん細胞の特徴は「未分化」であり「高度な分化」ではないため、この記述は誤り。世界の死因最多は「循環器疾患」であり「がん」ではないため、この記述も誤り。遺伝子治療で先天性疾患が「完全に」治る病気になったとまでは言えないため、この記述も誤り。エイズ（HIV感染による免疫不全）がcompromised host（易感染性宿主）を生む原因となるという記述は正しい。", "id": "2019_041_ae288e87"}, {"year": "2019", "field": "疾患", "q": "以下の問いから誤っているものをひとつ選びなさい。", "choices": ["1型糖尿病の初期は運動療法と食事療法が有効である。", "日本においては腎臓移植の生体移植の件数は死体移植の件数より多い。", "HIVウイルスはRNAを遺伝子として持っている。", "高血圧、糖尿病、肥満と喫煙習慣は動脈硬化の危険因子である。"], "answer": [0], "explain": "1型糖尿病はインスリン分泌がほぼ完全に欠乏するため、初期からインスリン注射による治療が必須であり、運動療法・食事療法のみでは対応できない。「1型糖尿病の初期は運動療法と食事療法が有効」という記述は誤り（2型糖尿病の初期治療との混同に注意）。", "id": "2019_042_bf40b71a"}, {"year": "2019", "field": "生態系", "q": "次の文章の中で、正しいものをすべて選びなさい。", "choices": ["ニイニイゼミの幼虫とセミタケとの関係は片利共生である。", "一般的に、栄養段階が高い生物種ほど、その個体数は少ない。", "深海熱水噴出孔周辺に生息する化学合成独立栄養細菌は、水中の酸素や火山ガス中の二酸化硫黄を利用してエネルギー合成ができる。", "産業革命以前の大気中のCO2濃度は、約280ppmであった。"], "answer": [1, 2, 3], "explain": "ニイニイゼミの幼虫とセミタケの関係は「寄生」の典型例であり片利共生ではないため、この記述は誤り（片利共生の例はコバンザメなど）。栄養段階が上がるほど個体数が少なくなるという記述、化学合成独立栄養細菌についての記述、産業革命以前のCO2濃度についての記述はいずれも正しい記述とされる（栄養段階と個体数の関係には例外もある）。", "id": "2019_043_154ced3c"}, {"year": "2019", "field": "生態系", "q": "次の文章の中で、誤っているものをすべて選びなさい。", "choices": ["湖沼や内湾に大量の窒素・リンが流入すると、アオコや赤潮の発生といった貧栄養化現象が見られる。", "硝化細菌は嫌気性条件下でアンモニアを亜硝酸や硝酸に酸化し、脱窒細菌は好気性条件下で亜硝酸や硝酸を窒素ガスに還元する。", "食物連鎖により、上位捕食者ほど生物濃縮の濃縮係数は大きくなる。", "土壌汚染サイトに栄養物を注入し、土着の有用微生物を活性化させることにより浄化を行う方法をバイオオーギュメンテーションという。"], "answer": [0, 1, 3], "explain": "窒素・リンの過剰流入で起こるのは「富栄養化」であり「貧栄養化」ではないため、この記述は誤り。硝化細菌は「好気性」条件下で働き、脱窒細菌は「嫌気性」条件下で働く（好気・嫌気が逆）ため、条件を取り違えたこの記述も誤り。バイオオーギュメンテーションは微生物そのものを投入する方法であり、栄養物の注入による活性化はバイオスティミュレーションと呼ばれるため、この記述も誤り。生物濃縮が上位捕食者ほど濃度が高まるという記述は正しい。", "id": "2019_044_802f4a59"}, {"year": "2019", "field": "発酵", "q": "次の食品のうち、糖化と発酵を同時に行う並行複発酵という方法で作られるものを一つ選びなさい。", "choices": ["ワイン", "ビール", "日本酒", "酢"], "answer": [2], "explain": "日本酒はコウジカビによる糖化とともに酵母によるアルコール発酵を同じ容器内で同時進行させる「並行複発酵」で作られる。ワインは単発酵（原料に糖が含まれるため糖化不要）、ビールは糖化と発酵を順番に行う単行複発酵、酢は酢酸発酵で作られる。", "id": "2019_045_2d3dfa9a"}, {"year": "2019", "field": "微生物・発酵", "q": "次の文章の中で、正しいものをすべて選びなさい。", "choices": ["ドイツの科学者コッホによりペニシリンが発見されたことを契機に抗生物質発酵の歴史が始まった。", "フランスの科学者パスツールは、「白鳥の首フラスコ実験」によって、微生物の自然発生説を否定した。", "放線菌の生産物であるストレプトマイシンは、アミノグリコシド系の抗生物質であり、結核菌を効果的に殺菌する。", "殺虫タンパク質として知られるBtタンパク質を含む食品がヒトや動物にとって無害な理由は、このタンパク質が胃酸などの酸性条件下で速やかに分解され無毒化されるからである。"], "answer": [1, 2, 3], "explain": "ペニシリンを発見したのはアレクサンダー・フレミングであり、コッホではない（コッホは結核菌などの発見者）ため、この記述は誤り。パスツールの白鳥の首フラスコ実験についての記述、ストレプトマイシンについての記述、Btタンパク質の無毒化についての記述はいずれも正しい。", "id": "2019_046_d991e447"}, {"year": "2019", "field": "ゲノム", "q": "ヒトゲノム解読により明らかとなった一塩基多型(SNP)についての説明で間違っているものを選びなさい。", "choices": ["ヒトゲノムの多型の内の1つである。", "ヒトゲノムでは、1000塩基に1塩基の割合で見つかる。", "ヒトゲノムに特有の現象である。", "薬剤感受性などと関連がある。"], "answer": [2], "explain": "SNP（一塩基多型）はヒトに限らず他の生物種のゲノムにも広く見られる現象であり、「ヒトゲノムに特有の現象である」という記述は誤り。", "id": "2019_047_77280578"}, {"year": "2019", "field": "ゲノム", "q": "以下の文章のうち、間違っているものを1つ選びなさい。", "choices": ["1つの遺伝子からは1種類のタンパク質がつくられるが、ヒトゲノムの約30億塩基対の全域にわたってタンパク質の産生を指令する遺伝子が存在するため、多様なタンパク質を作ることができる。", "RNAの中にはmRNAのようにタンパク質の設計図として使われないものが存在し、ncRNAと総称される。miRNAはその一つであり、mRNAと結合することで遺伝子発現を調節する。", "ヒトゲノムには人によって核酸塩基の配列が異なる部分があり、この違いが1%以上の頻度で起こる場合を多型という。多型のうち1つの塩基が置き換わっているものをSNPといい、疾患との関連の統計的解析が進んでいる。", "DNAからなる遺伝子の全体をゲノム、RNAの全体をトランスクリプトーム、タンパク質の全体をプロテオームという。DNAマイクロアレイはmRNAの発現を解析する技術である。"], "answer": [0], "explain": "選択的スプライシングにより1つの遺伝子から複数種類のタンパク質が作られ得るため「1種類のタンパク質がつくられる」という記述は誤り。また、タンパク質をコードする遺伝子はゲノムの全域ではなくごく一部（数%程度）に存在する点も誤り。ncRNAとmiRNAについての記述、多型とSNPについての記述、ゲノム・トランスクリプトーム・プロテオームの定義についての記述はいずれも正しい。", "id": "2019_048_62924b25"}, {"year": "2019", "field": "ゲノム", "q": "次の文章の中で、正しいものを一つ選びなさい。", "choices": ["ヒトゲノム解読後、機能を持っている領域は90%以上あることが証明された。", "タンパク質の情報を持たないRNAはノンセンスRNAと呼ばれる。", "1980年代に登場した自動シークエンサーでは、シークエンスシグナルは蛍光であった。", "ヒト全ゲノム解読は5年前に終了した。"], "answer": [2], "explain": "ヒトゲノムで機能を持つ領域が90%以上と証明されたわけではない（諸説あり）ため、この記述は誤り。タンパク質をコードしないRNAは「ノンコーディングRNA」と呼ばれるため、「ノンセンスRNA」という記述も誤り。ヒトゲノム解読は2003年に完了しており「5年前」という表現は多くの出題年で誤りとなる。1980年代の自動シークエンサーでシークエンスシグナルが蛍光であったという記述が正しい。", "id": "2019_049_9daefa01"}, {"year": "2019", "field": "医薬", "q": "間違っているものを選びなさい。", "choices": ["低分子医薬品と同様、バイオ医薬品も品質に同一性の保証が求められる。", "ES細胞もiPS細胞は胚性幹細胞であるが、造血幹細胞は体性幹細胞である。", "がん組織で亢進している血管透過性を利用するターゲティングをアクティブターゲティングという。", "血液接触型のバイオマテリアルでは血小板の活性化を引き起こす材料を用いる。"], "answer": [1, 2, 3], "explain": "iPS細胞は誘導多能性幹細胞であり、体細胞由来でES細胞（胚性幹細胞）とは異なる区分であるため、「ES細胞もiPS細胞は胚性幹細胞である」という記述は誤り。がん組織の血管透過性亢進（EPR効果）を利用するのはパッシブターゲティングであり、アクティブターゲティングは受容体・リガンド結合を利用する方法であるため、この記述も誤り。血液接触型バイオマテリアルは血栓形成を防ぐため血小板活性化を「抑制」する材料が求められ、「活性化を引き起こす材料を用いる」という記述は逆で誤り。低分子医薬品とバイオ医薬品の同一性保証についての記述は正しい。", "id": "2019_050_c59c53bd"}, {"year": "2019", "field": "医薬", "q": "間違っているものを選びなさい。", "choices": ["ケミカルバイオロジーとは、ヒット化合物に対して化学と生物学を使って創薬を行う学問である。", "受容体に結合してその機能を強める働きのある薬をアゴニストという。", "ヒト化抗体は完全にヒトのタンパク質でできた抗体である。", "人の血液から得られた血小板製剤は特定生物由来製品である。"], "answer": [0, 2], "explain": "ケミカルバイオロジーはヒット化合物を「見出す（得る）」ための学問であり、「ヒット化合物に対して創薬を行う学問」という記述は本来の定義とはややずれているため誤り。ヒト化抗体は可変領域の一部がマウス由来など完全にヒト由来ではない（ヒト抗体率は約90〜95%）ため、「完全にヒトのタンパク質でできた抗体」という記述も誤り。受容体に結合し機能を活性化する薬をアゴニストとする記述、血小板製剤が特定生物由来製品であるという記述は正しい。", "id": "2019_051_e4e719ac"}, {"year": "2019", "field": "ゲノム", "q": "間違っている文を一つ選択しなさい。", "choices": ["non-coding RNA (ncRNA)としてrRNA、tRNA、miRNA、endogenous siRNAなどが知られている。", "ヒトゲノムの配列には0.1%程度の個人差があり、主なものは一塩基多型 (SNP) である。", "セントラルドグマにより、1つの遺伝子からは1種類のタンパク質が作られる。", "ヒトゲノムでタンパク質をコードする領域であるエクソンはわずかに1.5%程度である。"], "answer": [2], "explain": "選択的スプライシングなどにより1つの遺伝子から複数種類のタンパク質が作られ得るため、「1つの遺伝子から1種類のタンパク質が作られる」という記述は誤り。", "id": "2019_052_a958c279"}, {"year": "2019", "field": "統計", "q": "間違っている文を一つ選択しなさい。", "choices": ["繰り返し検定を行う多重検定では擬陽性が生じる可能性が低くなる。", "有意水準をP=0.05とすると、20回検定したときに1回でも擬陽性が生じる確率は1-0.95^20=1-0.36=0.64である。", "機械学習を医療分野に適用するには予測率を高めるだけでなく、その医学的根拠を高めていくことが重要である。", "個別化医療では、遺伝子情報をもとに効果のある患者のみに投薬することが可能になる。"], "answer": [0], "explain": "検定を繰り返す（多重検定）と、少なくとも1回は偶然に有意差が出てしまう（擬陽性が生じる）確率はむしろ「高くなる」。「擬陽性が生じる可能性が低くなる」という記述は誤りで、これは多重検定の補正（ボンフェローニ補正など）が必要になる理由でもある。", "id": "2019_053_de476f54"}, {"year": "2021", "field": "細胞", "q": "正しいものを全て選べ", "choices": ["3つのドメインは真正細菌、古細菌、真核生物に分類される。また、五界説では真核生物が4界に分けられる。", "核を持たないのが原核生物であり、核を持つのが真核生物である。", "細胞は「外界及び細胞内を明確に区別する単位膜系を有する」「自己を複製する能力を有する」「外界と相互作用する」を満たし、生物の最小機能単位と言える。", "生物の階層性において、器官は細胞の上位に存在する。また、細胞小器官は細胞の下位に存在する。"], "answer": [0, 1, 2, 3], "explain": "3ドメイン説と五界説（真核生物をさらに動物界・植物界・菌界・原生生物界の4界に分ける）は基本知識として正しい。原核生物・真核生物の核の有無による区分も正しい。細胞の定義（膜・自己複製・外界との相互作用）も正しい。生物の階層性（分子＜細胞小器官＜細胞＜組織＜器官＜個体…）についての記述もすべて正しい。", "id": "2021_054_66bf230a"}, {"year": "2021", "field": "進化・細胞小器官", "q": "正しいものを全て選べ。", "choices": ["細胞内共生しているミトコンドリアと葉緑体は独自のDNAを持っているため、宿主の影響を受けることなく分裂・増殖ができる。", "ミトコンドリアは母系遺伝であるため、卵子のみがミトコンドリアを次世代に伝えることが出来る。", "ヘッケルは「系統発生は個体発生を繰り返す」という発生反復説を提唱した。咽頭胚から器官形成する咽頭胚期では、種を越えて胚の形が似通っていることから、発生砂時計モデルと呼ばれている。", "ダーウィンフィンチのくちばしがガラパゴス諸島の各島々で異なるのは、遺伝子の発現量と発現タイミングが異なることで、生息する環境に応じて進化したからである。"], "answer": [1, 2, 3], "explain": "ミトコンドリアや葉緑体は独自のDNAを持つが、分裂・増殖には多くの核コードタンパク質が必要であり、宿主の制御を受けているため、「宿主の影響を受けることなく分裂・増殖ができる」という記述は誤り。ミトコンドリアの母性遺伝についての記述、ヘッケルの発生反復説と発生砂時計モデルについての記述、ダーウィンフィンチのくちばしの進化についての記述は概ね正しい記述とされる（ヘッケルの発生反復説自体は後に否定的に再評価されており、咽頭胚期の保存性の説明として発生砂時計モデルと結び付けている点に留意）。", "id": "2021_055_020f0a92"}, {"year": "2021", "field": "遺伝", "q": "正しいものをすべて選べ。", "choices": ["連鎖とは二つ以上の遺伝子が同じ形質を示すことであり、メンデルの独立の法則に見かけは従わないように見える。", "伴性遺伝はミトコンドリアの遺伝子が母性遺伝することによるものである。", "同染色体に二つの遺伝子があるとき、近い距離にあるほうが遠い距離にあるよりも連鎖の度合いが弱い。", "減数分裂組み換えによって連鎖は部分的に解消される。"], "answer": [3], "explain": "連鎖とは同一染色体上に位置する複数の遺伝子が一緒に遺伝する現象を指し、「同じ形質を示すこと」という説明は不正確なため誤り。伴性遺伝は性染色体上の遺伝子による遺伝現象であり、ミトコンドリア遺伝子の母性遺伝とは別の概念なので、この記述も誤り。遺伝子間の物理的距離が近いほど連鎖は強く（組換えが起きにくく）、遠いほど連鎖は弱くなるため、「近い距離にあるほうが連鎖の度合いが弱い」という記述は逆で誤り。減数分裂時の組換えにより連鎖が部分的に解消されるという記述が正しい。", "id": "2021_056_0af673a9"}, {"year": "2021", "field": "医薬", "q": "誤っているものを二つ選べ", "choices": ["ゲノム創薬とは、ゲノム編集できる医薬品を開発することである。", "遺伝子組み換えタンパク質には、抗体医薬品が含まれる。", "バイオ医薬品は同一性を担保できない。", "電子体温計や電子式血圧計は、体外で使用するため医療機器ではない。"], "answer": [0, 3], "explain": "ゲノム創薬とは、ゲノム情報を活用して創薬標的の探索や医薬品開発を行う手法・分野を指し、「ゲノム編集できる医薬品を開発すること」という説明は誤り。電子体温計や電子式血圧計は体外で使用する機器であっても、人の身体の状態を計測する目的で用いられるため医療機器に分類されるので、「医療機器ではない」という記述も誤り。抗体医薬品が遺伝子組み換えタンパク質に含まれるという記述、バイオ医薬品が同一性を担保できないという記述は正しい（バイオ医薬品は複雑な高分子構造のため低分子医薬品のような完全な同一性を保証しにくい）。", "id": "2021_057_e9da40e5"}, {"year": "2021", "field": "遺伝子工学", "q": "正しいものを一つ選べ。", "choices": ["DNAリガーゼはDNAを断片化する作用を持つ。", "DNAのクローニングにはカルゴと呼ばれるプラスミドが使われる。", "DNAポリメラーゼは遺伝子を複製する酵素である。", "PCRは遺伝子を比例的に増加させる。"], "answer": [2], "explain": "DNAリガーゼはDNA断片を「連結する」酵素であり、断片化する（切断する）のは制限酵素の役割なので、「DNAを断片化する作用を持つ」という記述は誤り。クローニングに使われるベクターは一般にプラスミドと呼ばれるが、「カーゴ」という用語は本来プラスミド自体ではなく、プラスミドに載せて運ぶ目的のDNA配列（積み荷）を指す言葉であり、「カーゴと呼ばれるプラスミドが使われる」という記述はやはり誤り。PCRは鋳型DNAを指数関数的（2倍ずつ）に増幅する手法であり、「比例的に増加させる」という表現は不正確なため誤り。DNAポリメラーゼはDNAを複製する酵素であるという記述が正しい。", "id": "2021_058_3be148e5"}, {"year": "2021", "field": "遺伝", "q": "エンドウマメの交配実験に関する記述で、次の中から正しいものを1つ選びなさい。", "choices": ["親1の遺伝子型の如何に関わらず、F1の形質はすべて顕性の形質を示す。", "F1の色と形に注目して「黄色丸形：緑色丸形=1：1」であれば、親1の遺伝子型はPp/QQであったといえる。", "F1の形にのみ注目して「丸形：しわくちゃ=1：1」であれば、親1の遺伝子型はPp/Qqであったといえる。", "エンドウマメはメンデルの法則に従わない。"], "answer": [1], "explain": "親1がPp/QQであれば配偶子はPQ:pQ=1:1となり、黄丸:緑丸=1:1という観察結果と一致するため、この記述が正しい。「親1の遺伝子型の如何に関わらずF1はすべて顕性を示す」は親1の遺伝子型により顕性の出現率が変わるため誤り。「丸形:しわくちゃ=1:1であれば親1の遺伝子型はPp/Qq」という記述はPP/Qqの場合も同じ表現型比になり一意に決定できないため誤り。エンドウマメの実験はメンデルの法則の基礎となった実験であり、「メンデルの法則に従わない」という記述も誤り。", "id": "2021_059_8765f0a6"}, {"year": "2021", "field": "細胞", "q": "正しいものを一つ選べ。", "choices": ["細胞膜は脂質二重膜で構成されており、疎水性尾部の末端をお互い向き合わせるように並んでいる。脂質分子は流動的に位置を変化させ、異なる膜間でも脂質分子は移動する。", "真核生物の細胞小器官である核は核膜によって外部と隔てられている。核膜には核膜孔と呼ばれる微小な小孔があり、核内と細胞質との間の物質輸送の機能をもっている。", "小胞体は粗面小胞体と滑面小胞体の2種類があり、互いの内腔は連続している。粗面小胞体はリボソームを持ち、リボソームは電子顕微鏡において顆粒状に観察される。", "ゴルジ体は扁平な袋が積み重なった形状で、分泌タンパク質に糖鎖を付加する機能を持つ。分泌タンパク質はゴルジ体のcis面から細胞質へ向けて放出される。"], "answer": [1, 2], "explain": "脂質分子は同一膜内で流動的に移動するが、異なる膜間を自由に移動するわけではないため、「異なる膜間でも脂質分子は移動する」という記述は誤り。ゴルジ体からの分泌タンパク質の放出はtrans面（トランス面）から行われ、cis面ではない点、また「細胞質へ」ではなく細胞外への分泌が主要な機能である点で、ゴルジ体についての記述も誤り。核膜孔についての記述、小胞体の構造についての記述は正しい。", "id": "2021_060_39008300"}, {"year": "2021", "field": "起源", "q": "生命の起源に関する文章の空欄について、最も適切な語句の組み合わせを選びなさい（要旨：自然発生説を検証する実験を行った科学者(a)、生命の起源が他の天体由来とする(b)仮説、オパーリンが提唱した高分子集合体(c)、ユーリー・ミラーの実験で用いられた気体(d)）。", "choices": ["(a)メンテル (b)パンスペルミア (c)コアセルベート (d)メタン、酸素、アンモニア", "(a)パスツール (b)パンスペルミア (c)コアセルベート (d)メタン、水素、アンモニア", "(a)コッホ (b)ビッグバン (c)ミセル (d)メタン、酸素、アンモニア", "(a)パスツール (b)化学進化 (c)コアセルベート (d)メタン、水素、アンモニア"], "answer": [1], "explain": "白鳥の首フラスコ実験で自然発生説を否定したのはパスツールである（原文では誤って別の科学者名で記憶されている場合があるが正しくはパスツール）。他の天体からの生命起源説はパンスペルミア仮説、オパーリンが提唱した高分子集合体はコアセルベート、ユーリー・ミラーの実験で使われた原始大気を模した気体はメタン・水素・アンモニア（水蒸気とともに）であり、酸素は含まれない（原始大気は還元的環境と考えられていたため）。", "id": "2021_061_f7fc95d4"}, {"year": "2009", "field": "生殖・発生", "q": "以下の記述のうちで、正しいものを2つ選べ", "choices": ["サツマイモやヒドラは、有性生殖しか行わない。", "減数分裂の時に、相同染色体が組み換えを行い、多様性を生み出す。", "年をとるにつれ、テロメアは短くなる。", "卵割腔は、将来原腸になる。"], "answer": [1, 2], "explain": "サツマイモ（栄養生殖）やヒドラ（出芽）は無性生殖も行うため、「有性生殖しか行わない」という記述は誤り。卵割腔（割腔）は将来「原腸」ではなく、原腸は別の陥入によって形成されるため、この記述も誤り。減数分裂時の相同染色体の組み換えについての記述、加齢に伴うテロメア短縮についての記述はいずれも正しい。", "id": "2009_062_4b649d86"}, {"year": "2009", "field": "遺伝", "q": "メンデルの遺伝の法則について、正しいものを1つ選べ", "choices": ["優性の法則とは、優れた性質のみが遺伝すること。", "分離の法則とは、優れた性質のみが残るよう淘汰されること。", "メンデルの遺伝の法則により、「遺伝子」の存在が予見された。", "メンデルの遺伝の法則は、あらゆる形質に当てはまる。"], "answer": [2], "explain": "優性・劣性は形質の優劣ではなく対立遺伝子間の発現の仕方を指す用語であり「優れた性質」という意味ではないため、優性の法則についての記述は誤り。分離の法則は対になった遺伝子が別々の配偶子に入ることを意味し、淘汰とは無関係なため、この記述も誤り。メンデルの法則はすべての形質に当てはまるわけではなく、不完全優性や連鎖など例外があるため、この記述も誤り。メンデルの実験結果の考察から、目に見えない遺伝の実体＝「遺伝子」の存在が予見されたという記述が正しい。", "id": "2009_063_10ad6132"}, {"year": "2009", "field": "生態系", "q": "窒素処理として用いられない反応は次のうちどれか一つ選べ", "choices": ["脱アミノ", "脱窒", "硝化", "窒素固定"], "answer": [3], "explain": "脱アミノ・硝化・脱窒はいずれも排水処理における窒素除去プロセス（有機態窒素→アンモニア態→亜硝酸・硝酸態→窒素ガス）の一部として利用される。窒素固定は大気中の窒素をアンモニアに変換する反応で根粒菌などが行うが、排水処理における「窒素除去」の文脈で使われる反応ではない。", "id": "2009_064_20ffa78a"}, {"year": "2009", "field": "発生", "q": "次のうち、すべて中胚葉からできるものはどれか。", "choices": ["脳、脊髄などの神経系", "骨格筋、骨、血管、心臓、腎臓", "中耳、消化管の一部", "表皮、皮膚の付属器官"], "answer": [1], "explain": "神経系（脳・脊髄）は外胚葉由来。中耳や消化管は内胚葉由来。表皮は外胚葉由来（真皮は中胚葉）。骨格筋・骨・血管・心臓・腎臓などはすべて中胚葉由来の組織・器官であり、これが正解。", "id": "2009_065_adbaa675"}, {"year": "2009", "field": "遺伝", "q": "AaBb（両遺伝子とも独立、連鎖していない）を自家受精させた場合、その子の表現型と遺伝子型の組み合わせとして正しいものはどれか。Aとa、Bとbは対立遺伝子である。", "choices": ["表現型2タイプ、遺伝子型4タイプ", "表現型4タイプ、遺伝子型4タイプ", "表現型4タイプ、遺伝子型9タイプ", "表現型9タイプ、遺伝子型16タイプ"], "answer": [2], "explain": "AaBb×AaBbの自家受精では、独立の法則により表現型はAB:Ab:aB:ab=9:3:3:1の4タイプに分離する。遺伝子型はAA/Aa/aaとBB/Bb/bbの組み合わせで3×3=9タイプとなる。よって表現型4タイプ・遺伝子型9タイプが正しい。", "id": "2009_066_84d7ae14"}, {"year": "2009", "field": "生態系", "q": "次の記述のうち、正しいものを選びなさい。", "choices": ["生物圏は、水圏、岩石圏（地圏）、大気圏からなる。", "ガンでない良性の腫瘍というものは存在しない。", "食物連鎖の過程を繰り返すうち、上位捕食者ほど生物濃縮の濃縮係数は小さくなる。", "化学独立栄養細菌は、有機物を酸化してエネルギーを作る。"], "answer": [0], "explain": "生物圏は水圏・岩石圏（地圏）・大気圏の3つの圏から構成されるという説明が正しい。良性腫瘍（ガンでない腫瘍）は実際に存在するため、「良性の腫瘍というものは存在しない」という記述は誤り。生物濃縮は上位捕食者ほど濃縮係数が「大きく」なるため、「小さくなる」という記述も誤り。化学独立栄養細菌はアンモニアや硫化水素などの「無機物」を酸化してエネルギーを得るため、「有機物を酸化する」という記述も誤り。", "id": "2009_067_a6a823d9"}, {"year": "2009", "field": "起源", "q": "「DNA、RNA、タンパク質」のうち、どれが最初に地球上に現れたかという議論に関する記述として、正しいものを選びなさい。", "choices": ["多様なタンパク質が存在することが、タンパク質が最初に現れた根拠とされている。", "RNAが自己複製能力と触媒能力（リボザイム）を併せ持つことが、RNAが最初に現れたとする根拠の一つである。", "DNAは化学的に安定であることから、DNAが最初に現れたと考えるのが定説である。", "この議論には実験的な根拠は一切存在しない。"], "answer": [1], "explain": "現在最も有力視されているのはRNAワールド仮説であり、その根拠はRNAが遺伝情報の保持（自己複製）と酵素的な触媒作用（リボザイム）の両方を担うことができる点にある。「多様なタンパク質が存在することがタンパク質が最初に現れた根拠」という記述は誤り（実際には多様なタンパク質の存在はむしろタンパク質を作る仕組みが先に必要だったことを示唆する）。「DNAが最初に現れたと考えるのが定説」という記述も誤り。「実験的な根拠は一切存在しない」という記述もリボザイムの発見など実験的根拠があるため誤り。", "id": "2009_068_aa441f0d"}, {"year": "2009", "field": "微生物・発酵", "q": "チーズの製造に関する記述として正しいものを選びなさい。", "choices": ["チーズは乳酸発酵を利用して製造される。", "チーズは酪酸発酵を利用して製造される。", "チーズはアルコール発酵を利用して製造される。", "チーズは硝酸発酵を利用して製造される。"], "answer": [0], "explain": "チーズは乳酸菌による乳酸発酵（牛乳中のカゼインを凝固させる）を利用して製造される。酪酸発酵ではない点に注意（酪酸発酵は誤りの選択肢としてよく出題される）。", "id": "2009_069_69c85f4b"}, {"year": "2009", "field": "細胞", "q": "小胞体に関する記述として正しいものを選びなさい。", "choices": ["滑面小胞体は、リボソームと小胞体からなる細胞小器官である。", "粗面小胞体は表面にリボソームを持つ小胞体である。", "滑面小胞体はタンパク質合成を行う主要な場である。", "小胞体はすべて同一の構造・機能を持つ。"], "answer": [1], "explain": "リボソームを表面に持ち、タンパク質合成の場となるのは粗面小胞体である。滑面小胞体はリボソームを持たず、脂質合成や解毒などタンパク質合成以外の機能を担う。", "id": "2009_070_8109cd9c"}, {"year": "2009", "field": "バイオ技術", "q": "日本における遺伝子組み換え食品の表示義務に関する記述として、最も適切なものを選びなさい。", "choices": ["加工食品の原材料の重量に占める割合が上位3位以内で、かつ5%以上を占める場合に表示義務が生じる。", "原材料の重量の10%以上を占める場合に、一律に表示義務が生じる。", "遺伝子組み換え作物が少しでも混入していれば必ず表示しなければならない。", "表示義務は存在せず、任意表示のみが認められている。"], "answer": [0], "explain": "日本の制度では、加工食品の全原材料のうち重量に占める割合が上位3位以内であり、かつ原材料の重量に占める割合が5%以上を占める場合に、遺伝子組み換え原材料の使用表示義務が生じる。例えば加工食品200kgのうち原料として8kgの遺伝子組み換え大豆を使った場合（8/200=4%）は、5%未満のため表示義務は生じない点にも注意。", "id": "2009_071_987aaf2d"}, {"year": "2009", "field": "代謝", "q": "光合成に関する記述として正しいものを選びなさい。", "choices": ["明反応はストロマで起こる。", "明反応における最終電子受容体はNADP+である。", "明反応における最終電子受容体は水である。", "暗反応（炭酸固定）はチラコイド膜で起こる。"], "answer": [1], "explain": "光合成の明反応はチラコイド膜で起こり（ストロマではない）、暗反応（炭酸固定・カルビン回路）はストロマで起こる。明反応において水は電子供与体として働き分解される（光分解）が、最終的な電子受容体はNADP+であり、NADPHが生成される。", "id": "2009_072_a726f104"}, {"year": "2009", "field": "ゲノム", "q": "ヒトゲノムに関する記述として正しいものを選びなさい。", "choices": ["ヒトゲノムにおけるSNP（一塩基多型）は、およそ100塩基に1個の割合で存在する。", "ヒトゲノムにおけるSNPは、およそ1000塩基に1個の割合で存在する。", "SNPはヒトゲノムに特有の現象であり、他の生物には見られない。", "SNPは疾患との関連性が全く認められていない。"], "answer": [1], "explain": "ヒトゲノムにおけるSNP（一塩基多型）は、一般に1000塩基あたり1個程度の頻度で見られるとされる（100個に1個ではない）。SNPはヒトに限らず様々な生物種で見られる現象であり、疾患との関連性についての統計的研究も進んでいる。", "id": "2009_073_05f02c9a"}, {"year": "2009", "field": "iPS細胞", "q": "iPS細胞に関する記述として、より正確なものを選びなさい。", "choices": ["iPS細胞はあらゆる細胞に分化できる万能性を完全に保証されている。", "iPS細胞は体細胞に複数の因子を導入することで作製される多能性幹細胞であり、様々な細胞への分化が期待されるが、実用化にはなお課題がある。", "iPS細胞はES細胞と全く同じ由来（胚）を持つ細胞である。", "iPS細胞には拒絶反応のリスクが全くない。"], "answer": [1], "explain": "iPS細胞（人工多能性幹細胞）は体細胞にYamanaka因子などを導入して人工的に作られる多能性幹細胞であり、様々な細胞への分化能を持つが「あらゆる細胞に分化できる」と無条件に言い切ることや、拒絶反応リスクが皆無であるという断定は不正確。ES細胞（胚由来）とは作製方法・由来が異なる。", "id": "2009_074_b79996cd"}, {"year": "2010", "field": "生化学", "q": "正しいものを1つ選びなさい", "choices": ["疎水性を示すトリプトファンは体内で合成できる非必須アミノ酸である", "RNAの構成塩基の1つであるウラシルのワトソン・クリック型相補塩基はアデニンである", "DNAは主に左回りの螺旋からなる二重螺旋構造をもっている", "DNAの構成塩基のグアニンとシトシンはともにピリミジン環を有する"], "answer": [1], "explain": "トリプトファンは体内で合成できない必須アミノ酸であるため、「非必須アミノ酸である」という記述は誤り。DNAの二重らせんは主に右回り（B型）であるため、「左回り」という記述も誤り。グアニンはプリン環、シトシンはピリミジン環を持ち、両方がピリミジン環というのは誤り。ウラシルはアデニンと相補的に対を作るという記述が正しい。", "id": "2010_075_80841520"}, {"year": "2010", "field": "細胞", "q": "細胞に関する以下の記述のうち、正しいものを1つ選びなさい", "choices": ["真正細菌や古細菌は核および細胞小器官をもっている", "DNAはタンパク質のアミノ酸配列を決める設計図であり、DNAとタンパク質の仲介にRNAが重要な働きをする", "タンパク質は構成要素のアミノ酸がホスホジエステル結合で多数連結した重合体である", "ウイルスは単独で増殖するが、自分自身でエネルギーを産生できない"], "answer": [1], "explain": "真正細菌・古細菌はともに原核生物であり核を持たないため、「核及び細胞小器官をもっている」という記述は誤り。アミノ酸同士を連結するのはペプチド結合であり、ホスホジエステル結合ではないため、タンパク質についての記述も誤り。ウイルスは単独では増殖できず宿主細胞に依存するため、この記述も誤り。DNA→RNA→タンパク質という遺伝情報の流れに関する記述が正しい。", "id": "2010_076_5f9e7451"}, {"year": "2010", "field": "細胞", "q": "誤っているものを1つ選びなさい", "choices": ["細胞は生物の最小機能単位である", "細胞は脂質二重膜からなる細胞膜により外界と隔てられている", "リン脂質は三大生体高分子のひとつである", "リン酸化されるアミノ酸はセリン、トレオニン、チロシンである"], "answer": [2], "explain": "三大生体高分子（あるいは主要な生体高分子）は一般にタンパク質・核酸・糖類（多糖）を指し、リン脂質は含まれないため、「リン脂質は三大生体高分子のひとつである」という記述が誤り。細胞の定義についての記述、脂質二重膜についての記述、リン酸化されるアミノ酸についての記述はいずれも正しい（リン酸化を受けるアミノ酸はセリン・トレオニン・チロシンの3つ）。", "id": "2010_077_e38314b1"}, {"year": "2010", "field": "遺伝", "q": "誤っているものを1つ選びなさい", "choices": ["二倍体細胞では、父方および母方からそれぞれ受け継いだ、互いによく似た二本一組の相同染色体が存在する", "ヒトでは、22対の常染色体と1対の性染色体が存在する", "相同な遺伝子座を占める対立遺伝子では父方および母方由来の遺伝子は常に同じ種類である", "真核細胞の配偶子形成の際に行われる減数分裂において、染色体複製の後の相同染色体が対合したときに、相同組み換えにより染色体の交差が生じることがある"], "answer": [2], "explain": "対立遺伝子は同じ遺伝子座にあっても、父方由来と母方由来で異なる対立遺伝子（例えばAとa）を持つ場合（ヘテロ接合）と同じ場合（ホモ接合）の両方があり得るため、「父方および母方由来の遺伝子は常に同じ種類である」という記述が誤り。相同染色体についての記述、常染色体・性染色体の数についての記述、減数分裂時の染色体交差についての記述はいずれも正しい。", "id": "2010_078_6a036f15"}, {"year": "2010", "field": "遺伝", "q": "メンデルの遺伝の法則について、正しいものを1つ選びなさい", "choices": ["「優性の法則」とは、優れた形質のみが遺伝されるという意味である", "「分離の法則」とは、優れた形質以外は進化の過程で淘汰されるという意味である", "メンデルの遺伝の法則により「遺伝子」の存在が予見された", "「独立の法則」とは、優れた形質をもった生物のみが自然淘汰で生き残ることができるという意味である"], "answer": [2], "explain": "優性の法則は「優れた形質が遺伝する」という意味ではなく、対になった遺伝子のうち一方の形質のみが表現型に現れることを指すため、この記述は誤り。分離の法則は対になった遺伝子が別々の配偶子に入って伝わることを意味し、淘汰とは無関係なので、この記述も誤り。独立の法則は異なる対立遺伝子が互いに影響することなく独立に配偶子に分配されることを意味し、自然淘汰とは無関係なため、この記述も誤り。メンデルの実験結果から見えない遺伝の実体＝遺伝子の存在が予見されたという記述が正しい。", "id": "2010_079_01c55435"}, {"year": "2010", "field": "細胞", "q": "細胞の構造に関する記述のうち、誤っているものを1つ選びなさい", "choices": ["動物細胞と植物細胞を比較したとき、植物細胞に固有の構造として、葉緑体、液胞、細胞膜があげられる", "染色体とは細胞周期の分裂期に見られる凝縮した構造体を指す", "細胞膜を構成する主要な成分であるリン脂質には頭部と尾部があるが、頭部は親水性、尾部は疎水性である", "細胞膜の脂質二重層において、内層と外層を構成するリン脂質成分の分布は非対称である"], "answer": [0], "explain": "細胞膜は動物細胞・植物細胞双方に存在する構造であり、植物細胞に固有の構造ではない。植物細胞に固有の構造としては葉緑体・液胞・「細胞壁」が正しく、この記述は細胞膜と細胞壁を取り違えている点で誤り。染色体についての記述、リン脂質の頭部・尾部についての記述、脂質二重層の非対称性についての記述はいずれも正しい。", "id": "2010_080_a440f7b3"}, {"year": "2010", "field": "細胞", "q": "誤っているものを1つ選びなさい", "choices": ["滑面小胞体は、小胞体とリボソームから構成される細胞小器官である", "リボソームは、大小2つのサブユニットから成る構造体であり、mRNAの情報を読み取りタンパク質を生合成（翻訳）する場として、あらゆる生物の細胞内に存在する", "ミトコンドリアは、外膜と内膜の二重膜構造をもち、内膜において好気的呼吸により生命の維持に必要なエネルギーを産生している", "ミトコンドリアは、核内DNAとは別に自身のDNAを持つ"], "answer": [0], "explain": "リボソームを表面に持つのは粗面小胞体であり、滑面小胞体はリボソームを持たないため、「滑面小胞体はリボソームと小胞体から構成される」という記述が誤り。リボソームの構造と機能についての記述、ミトコンドリアの二重膜構造とエネルギー産生についての記述、ミトコンドリアの独自DNAについての記述はいずれも正しい。", "id": "2010_081_7945c864"}, {"year": "2010", "field": "細胞", "q": "正しいものを1つ選びなさい", "choices": ["リソソームは植物細胞におけるタンパク質分解の場である", "分泌タンパク質はゴルジ体を通って細胞外へと輸送される", "真核生物は、膜構造で囲まれた細胞小器官としての核をもたない", "細胞骨格には、微小管、コラーゲン、中間径フィラメントの3種類がある"], "answer": [1], "explain": "植物細胞は一般にリソソームを持たず、液胞がその役割を代替するため、「リソソームは植物細胞におけるタンパク質分解の場である」という記述は誤り。真核生物の定義そのものが「膜に囲まれた核を持つ」ことなので、「核をもたない」という記述は矛盾し誤り。細胞骨格はアクチンフィラメント（マイクロフィラメント）、微小管、中間径フィラメントの3種類からなり、コラーゲンは細胞骨格ではなく細胞外マトリックスの成分であるため、この記述も誤り。分泌タンパク質が小胞体からゴルジ体を経て細胞外に輸送されるという記述が正しい。", "id": "2010_082_b46df0e7"}, {"year": "2010", "field": "代謝", "q": "誤っているものを1つ選びなさい", "choices": ["TCA回路では、1モルのアセチルCoAから、二酸化炭素が2モル、GTPが1モル、NADHが3モル、FADH2が1モル生成する", "ミトコンドリア複合体Iは、NADHを基質とする電子伝達系の入り口の1つである。1モルのNADHの酸化により、10モルのプロトンが膜間腔にくみ出され、複合体Vにおいて2.5モルのATPが生成される", "複合体IIは、もう一つの電子伝達系の入り口であり、TCA回路のコハク酸脱水素酵素と共役し、FADH2を基質として電子を伝達する", "光合成における明反応とは、チラコイド膜における光の吸収、電子伝達とATP合成、炭酸固定による炭水化物の生成を指す"], "answer": [0], "explain": "TCA回路では1モルのアセチルCoAから二酸化炭素が「3モル」生じるとされ、「二酸化炭素が2モル」という記述は誤り（教科書によって表記の仕方が異なる場合がある点に留意）。複合体Iについての記述、複合体IIについての記述、光合成の明反応についての記述は正しいとされる（ただし「炭酸固定」は本来は暗反応の内容であり、この文自体は出題上不正確な部分を含む可能性がある点に留意）。", "id": "2010_083_a6d3c59a"}, {"year": "2010", "field": "代謝", "q": "正しいものを1つ選びなさい", "choices": ["解糖系は細胞内のサイトゾルで反応が進み、最終的には核にある遺伝子の転写を引き起こす", "解糖系には、エネルギーを費やす「投資の過程」とエネルギーが発生する「利益回収の過程」とが含まれるが、1モルのグルコースが解糖系を経た結果を総じて計算すると2モルのATPが消費されている", "電子伝達系における水素イオン（プロトン）の移動は、マトリクスから膜間腔の方向である", "代謝反応は、一般的には不可逆反応であるが、酵素が存在すると可逆反応となる"], "answer": [2], "explain": "解糖系はサイトゾルで進行しピルビン酸を生じるのであり、核内の遺伝子転写を引き起こすものではないため、この記述は誤り。解糖系全体では差し引き2モルのATPが「産生」されるのであり「消費」されているという記述は誤り。酵素は反応を触媒し速度を変えるが、それ自体が反応を不可逆から可逆に変えるわけではないため、この記述も誤り。電子伝達系ではプロトンがマトリックスから膜間腔へくみ出されるという記述が正しい。", "id": "2010_084_b1d2cb7d"}, {"year": "2010", "field": "発生", "q": "正しいものをすべて選びなさい", "choices": ["胃、肺、小腸はすべて内胚葉由来である", "受精卵は卵割することにより、細胞数を増やしていく", "外胚葉が内胚葉を神経管へと誘導する", "有性生殖の利点は、素早く次世代を作ることができる点である"], "answer": [0, 1], "explain": "神経管に誘導されるのは外胚葉自身（一部）であり、誘導するのは中胚葉（脊索）である。「外胚葉が内胚葉を神経管へと誘導する」という記述は主体・客体が逆であり誤り（これをオーガナイザーと呼ぶ）。有性生殖の利点は多様性を生み出すことにあり、無性生殖の方が素早く次世代を作れるため、「有性生殖の利点は素早く次世代を作れること」という記述も誤り。胃・肺・小腸がすべて内胚葉由来であるという記述、受精卵が卵割を経て細胞数を増やすという記述はいずれも正しい。", "id": "2010_085_ab134e37"}, {"year": "2010", "field": "起源", "q": "原始地球において、化学進化によって無機物から有機物が生まれ、やがて生命が誕生した。原始地球の大気中には含まれていなかったと考えられている気体を次の中から1つ選びなさい", "choices": ["メタン", "アンモニア", "水", "酸素"], "answer": [3], "explain": "原始大気は還元的環境であったと考えられ、メタン・アンモニア・水蒸気などが主成分であったとされる。酸素は反応性が高く他の元素と結合しやすいため、原始大気にはほとんど存在しなかったと考えられている（光合成生物の登場後に大気中に蓄積した）。", "id": "2010_086_10d94cf2"}, {"year": "2010", "field": "生態系", "q": "熱水噴火口付近の生態系において有機物を産生している生物を1つ選びなさい", "choices": ["植物", "光合成細菌", "化学合成細菌", "従属栄養細菌"], "answer": [2], "explain": "深海の熱水噴出孔付近は太陽光が届かないため光合成は行われず、噴出する熱水に含まれる硫化水素などの無機物を酸化してエネルギーを得る化学合成細菌が一次生産者として有機物を産生している。", "id": "2010_087_b6729927"}, {"year": "2010", "field": "生態系", "q": "誤っているものを1つ選びなさい", "choices": ["生物群集とそれをとりまく無機的環境を含めた統一システムを生態系といい、生物群集は複数の個体群から構成される", "従属栄養生物は親が子供に栄養（食物）を供給して生育する生物群であり哺乳類や鳥類などが該当する。一方、独立栄養生物は子供が自分で栄養を獲得する生物群で魚類などが該当する", "同じ場所に生息する2種の生物において、一方だけが害を被るが、他方は影響を受けない関係を片害作用という。この相互作用を産業に応用した例としては抗生物質がある", "従来、生態系中の微生物の解析や有用遺伝子の探索を行うためには、1種類ずつ取り出して培養する必要があった。しかし、近年の技術発展に伴いメタゲノム解析という手法が確立され、培養を必要としない遺伝子の解析や探索を行うことが可能となった"], "answer": [1], "explain": "従属栄養生物・独立栄養生物の区分は「親が子に栄養を与えるか」ではなく、「自ら無機物から有機物を合成できるか（独立栄養）」「他者が作った有機物に依存するか（従属栄養）」という区分であるため、親の給餌行動で分類する記述は誤り。生態系の定義についての記述、片害作用についての記述、メタゲノム解析についての記述はいずれも正しい。", "id": "2010_088_2bd68e64"}, {"year": "2010", "field": "環境", "q": "正しいものを1つ選びなさい", "choices": ["リンは、地球の物質循環の代表的な元素であるが、リン鉱石に含まれるため、物質循環の過程において動物の体内に入ることはない", "化石燃料は過去の植物体が変性し蓄積されたものであり、過去には光合成に関与していたことから、カーボンニュートラルな資源といえる", "排水中に含まれる窒素・リンが湖沼や内湾に流入して富栄養化状態になると、微細藻類の異常増殖によるアオコやプランクトンの異常増殖による青潮が発生する", "トリクロロエチレンなどの有機塩素化合物は、生物によって分解されにくいため、これらが土壌に入り込むと長く残留し、地下水汚染を引き起こす恐れがある"], "answer": [3], "explain": "リンはカルシウムに次いで動物の体内に多く存在するミネラルであり、体内に入らないという記述は誤り。化石燃料は炭素の吸収・放出のサイクルが非常に遅い（数百万年単位）ため、カーボンニュートラルとは通常みなされず、この記述も誤り。富栄養化によって発生する現象は「青潮」ではなく「赤潮」（プランクトンの異常増殖による水の変色）であり、青潮は別のメカニズム（貧酸素水塊の表層への湧昇）による現象なので、この記述も誤り。トリクロロエチレンなどの有機塩素化合物についての記述が正しい。", "id": "2010_089_66ffc169"}, {"year": "2010", "field": "環境", "q": "誤っているものを1つ選びなさい", "choices": ["植物は光合成によって、有機物を生産しており、地球の元素循環に重要な役割を果たしているが、近年、熱帯林の減少が問題となっている", "食物連鎖により、上位捕食者ほど生物濃縮の濃縮係数は大きくなる", "生物学的排水処理は自然の浄化システムを応用しており、例えばアンモニア酸化細菌は嫌気条件下で窒素除去に重要な役割を果たしている", "排水処理と同時にエネルギーを得ることも可能であり、例えばメタン生成古細菌を活用したメタン発酵は既に実用化されている"], "answer": [2], "explain": "アンモニア酸化細菌（硝化細菌）は「好気」条件下でアンモニアを酸化するため、「嫌気条件下で窒素除去に重要な役割を果たしている」という記述は誤り。植物の光合成についての記述、生物濃縮についての記述、メタン発酵の実用化についての記述はいずれも正しい。", "id": "2010_090_c0e407ed"}, {"year": "2010", "field": "発酵", "q": "誤っているものを1つ選びなさい", "choices": ["ラムサール条約は、水鳥の生息地として重要な干潟などの湿地の保護について国際協力を求めた条約である", "酪酸菌による酪酸発酵を利用してチーズが作られる", "最終電子受容体として無機分子を使ってエネルギーを獲得する代謝を発酵という", "遺伝子組み換え技術に用いるアグロバクテリウム法は、アグロバクテリウムという土壌微生物が自分の持つプラスミドDNAの一部を切り離し、その遺伝子を植物ゲノム中に組み込む性質を利用して開発された方法である"], "answer": [1], "explain": "チーズは乳酸菌による乳酸発酵を利用して作られるのであり、酪酸発酵ではないため、「酪酸菌による酪酸発酵を利用してチーズが作られる」という記述が誤り。ラムサール条約についての記述、アグロバクテリウム法についての記述は正しい（発酵の定義についての記述は、消去法により明確な誤りとされる酪酸発酵の記述と比べると相対的に問題視されにくい）。", "id": "2010_091_48cc1a80"}, {"year": "2010", "field": "エネルギー", "q": "誤っているものを1つ選びなさい", "choices": ["メタンハイドレートは、低温・高圧状態で形成されたメタンと水の包接化合物であり、日本近海には日本の天然ガス消費量の約100年分に相当する埋蔵量があるとされている", "太陽光発電や燃料電池のほかに、メタンハイドレートやバイオマスも新エネルギーとして位置づけられている", "バイオエタノールを作る原料には、食料には利用できない植物のみが利用される", "ガソホールとは、ガソリンにエタノールを10～20%混入した自動車燃料のことである"], "answer": [2], "explain": "バイオエタノールの原料は食料に利用できない植物（セルロース系バイオマス等）に限らず、サトウキビやトウモロコシなど食料としても利用できる植物からも作られる（第一世代バイオエタノール）ため、「食料には利用できない植物のみが利用される」という記述が誤り。メタンハイドレートについての記述、新エネルギーの位置づけについての記述、ガソホールについての記述はいずれも正しい。", "id": "2010_092_f0476607"}, {"year": "2010", "field": "エネルギー", "q": "誤っているものを1つ選びなさい", "choices": ["エネルギー源を化石燃料と非化石燃料に分けた場合、石油は化石燃料で、天然ガスは非化石燃料の自然エネルギーに分類される", "化石燃料の燃焼は、地球温暖化の一因とされる二酸化炭素の排出だけでなく、酸性雨の原因となる硫黄酸化物や窒素酸化物の排出を伴う", "二酸化炭素などの温室効果ガスは、可視光はよく通すが赤外線（熱）は吸収する", "バイオマスエネルギーの消費の際に排出される二酸化炭素の量は、バイオマスの生育時に吸収した二酸化炭素の量と相殺されるという、カーボンニュートラルとよばれる考え方がある"], "answer": [0], "explain": "天然ガスも石油や石炭と同様に化石燃料に分類され、非化石燃料（自然エネルギー）ではないため、「天然ガスは非化石燃料の自然エネルギーに分類される」という記述が誤り。化石燃料の燃焼と大気汚染物質についての記述、温室効果ガスの性質についての記述、カーボンニュートラルについての記述はいずれも正しい。", "id": "2010_093_0d25d165"}, {"year": "2010", "field": "ゲノム", "q": "正しいものを1つ選びなさい", "choices": ["全ての哺乳類の染色体は24対からなる", "ヒトの遺伝子領域は、大腸菌のそれと比較して非常に長いが、それはイントロンが存在するためである", "ヒト細胞内にはタンパク質をコードしないRNAは、rRNAとtRNA以外には報告がない", "ヒトのゲノムにはマイクロサテライトと呼ばれる数塩基の反復配列を多く含み、この存在が個人差を決定する最も重要な変異である"], "answer": [1], "explain": "哺乳類の染色体数は種によって異なり（ヒトは23対）、すべて24対というのは誤り。ヒト細胞内にはrRNA・tRNA以外にもmiRNAなど多様なノンコーディングRNAが存在することが報告されているため、「rRNAとtRNA以外には報告がない」という記述も誤り。マイクロサテライトは個人差を示す一つの指標ではあるが「最も重要な変異」と断定するのは過度な一般化で誤り（SNPなども重要とされる）。ヒトの遺伝子領域が大腸菌と比較して長い主な理由の一つがイントロンの存在であるという記述が妥当とされる。", "id": "2010_094_92dccb4d"}, {"year": "2010", "field": "ゲノム", "q": "誤っているものを1つ選びなさい", "choices": ["ヒト全ゲノム中、タンパク質をコードする領域は1.5%程度である", "マウスとヒトのnon-coding RNAはよく保存されている", "ある集団で、1%以上の頻度で認められる一塩基変異のことをSNP (Single Nucleotide Polymorphism)と呼ぶ", "進化的に高度に保存された領域がある"], "answer": [1], "explain": "マウスとヒトのnon-coding RNA（非コードRNA）領域は、タンパク質コード領域（エクソン）と比較すると進化的な保存性が低い傾向にあるとされ、「よく保存されている」という一般化は誤りとされる。タンパク質コード領域の割合についての記述、SNPの定義についての記述、進化的に保存された領域があるという記述はいずれも正しい。", "id": "2010_095_42bb98de"}, {"year": "2010", "field": "疾患", "q": "正しいものを全て選びなさい", "choices": ["本邦におけるガンによる死亡率が最も高いガンは肝臓ガンである", "子宮頸ガンの発症にパピローマウイルス感染が関与しているが、これに対する効果的な治療法は存在しない", "動脈硬化の発症に、乱れた食生活や運動量低下に起因する肥満症が密接に係わっている", "高コレステロール血症はメタボリック症候群の診断基準のひとつである"], "answer": [2, 3], "explain": "日本におけるがんの死亡率は男女によって順位が異なるが、肝臓がんが最多というのは誤り（肺・胃・大腸がんなどが上位）。子宮頸がんはパピローマウイルスワクチンなど予防法があり、「効果的な治療法が存在しない」と断定するのは誤り。動脈硬化と肥満症の関係についての記述、高コレステロール血症とメタボリック症候群についての記述は正しい。", "id": "2010_096_d683b7e7"}, {"year": "2010", "field": "疾患", "q": "正しいものを1つ選びなさい", "choices": ["先進国の死因として多い感染症は消化器系のものである", "わが国では生体臓器移植が盛んに行われている", "糖尿病の血管病変は、主に大動脈などの大きな血管に生じる", "インシュリン治療は2型糖尿病の治療に用いられる"], "answer": [3], "explain": "先進国における死因として多い感染症は呼吸器系のもの（肺炎など）が上位であり、「消化器系のものである」という記述は誤り。日本では臓器提供者（ドナー）不足のため生体移植は行われるが「盛んに行われている」というほど活発とは言えない（文脈により判断が分かれる）。糖尿病の血管病変（糖尿病性合併症）は主に毛細血管などの細小血管に生じるため、「大動脈などの大きな血管に生じる」という記述は誤り。インスリン治療は1型糖尿病だけでなく、血糖コントロールが困難な2型糖尿病にも用いられるという記述が正しい。", "id": "2010_097_9a575a1f"}, {"year": "2017", "field": "細胞", "q": "以下の記述のうち誤っているものを1つ選ぶ。", "choices": ["3つのドメインとは真正細菌、古細菌、真核生物である。", "真核生物は、真正細菌よりも古細菌と似ている。", "大腸菌は菌界に属する。", "藍藻類は原核生物である。"], "answer": [2], "explain": "大腸菌は細菌（原核生物）であり、五界説では「モネラ界」に属する。「菌界」はカビ・キノコなど真核生物である菌類が属する分類であり、細菌の一種である大腸菌が菌界に属するというのは誤り。「～菌」という名称でも細菌以外（カビなど）は菌界に属するため、分類上の混同に注意が必要。", "id": "2017_098_5492fa38"}, {"year": "2017", "field": "生化学", "q": "以下の記述のうち誤っているものを1つ選ぶ。", "choices": ["DNAの情報はRNAポリメラーゼによってRNAに変換（転写）される。", "トレオニンは必須アミノ酸、疎水性アミノ酸両方に属する。", "生体内のシグナル伝達、活性調節等に、チロシン、トレオニン、セリンのリン酸化は重要な役割を果たす。", "糖鎖の全合成は、ゴルジ体、小胞体で行われる。"], "answer": [1], "explain": "トレオニンは必須アミノ酸であるが、側鎖に水酸基を持ち親水性アミノ酸に分類されるため、「疎水性アミノ酸両方に属する」という記述は誤り。RNAポリメラーゼによる転写についての記述、リン酸化についての記述、糖鎖合成についての記述はいずれも正しい。", "id": "2017_099_be1cebb2"}, {"year": "2017", "field": "遺伝", "q": "以下の記述のうち正しいものを1つ選ぶ。", "choices": ["検定交雑では、優性のホモ接合体と未知の遺伝子型を持つ個体を交雑させることによって、遺伝子型を特定する。", "メンデルの「優性の法則」はどんな場合でも成り立つ。", "組み換え価はヘテロ接合体と劣性ホモ接合体とを交雑させ、生じた表現型と分離比から求めることができる。", "DNAの2本鎖はヒストンというたんぱく質に巻き付き、ヌクレオチドを形成、更にそれが連なると安定なクロマチン構造となる。"], "answer": [2], "explain": "検定交雑では「劣性」のホモ接合体（潜性ホモ）と未知の遺伝子型を持つ個体を交雑させることで、未知個体の遺伝子型を特定するため、「優性のホモ接合体と交雑させる」という記述は誤り。優性の法則には不完全優性のような例外があり、あらゆる場合に成り立つわけではないため、この記述も誤り。DNAがヒストンに巻き付いて形成される構造単位は「ヌクレオソーム」であり「ヌクレオチド」ではないため、この記述も誤り。組み換え価がヘテロ接合体と劣性ホモ接合体の検定交雑によって得られた表現型分離比から算出できるという記述が正しい。", "id": "2017_100_73cafdda"}, {"year": "2017", "field": "遺伝", "q": "以下の記述のうち正しいものを1つ選ぶ。", "choices": ["体細胞分裂はG1期→M期→G2期→S期の順序で起こる。", "血液型にはA,B,O型遺伝子の3つの対立遺伝子で決まり、AB型は劣性である。", "血友病は、男性の方が発症率が高い。", "アセトアルデヒドの酸化をつかさどる酵素、ALDH2は2量体で酵素活性を有する。"], "answer": [2], "explain": "体細胞分裂の正しい順序はG1期→S期→G2期→M期であり、順序を入れ替えた記述は誤り。血液型ではAB型はA遺伝子とB遺伝子の両方が発現した結果であり、O型が劣性であるため、「AB型は劣性である」という記述は誤り。ALDH2は4量体で酵素活性を持つため、「2量体で酵素活性を有する」という記述も誤り。血友病の原因遺伝子はX染色体上にあり伴性遺伝するため、X染色体を1本しか持たない男性の方が発症しやすいという記述が正しい。", "id": "2017_101_1af49b66"}, {"year": "2017", "field": "細胞", "q": "以下の記述のうち正しいものを1つ選びなさい。", "choices": ["脂質二重膜は疎水性の頭部、親水性の尾部をもつ脂質分子からなる。", "ゴルジ体は滑面小胞体近傍に存在する。", "葉緑体において明反応はチラコイドで、暗反応はグラナで行われる。", "ミトコンドリアと葉緑体は核内のものとは異なる独自の環状DNAを持つ。"], "answer": [3], "explain": "脂質二重膜のリン脂質は「親水性」の頭部と「疎水性」の尾部を持つため、頭部・尾部を逆にした記述は誤り。ゴルジ体はタンパク質合成の場であるリボソームを持つ粗面小胞体の近傍に存在するため、「滑面小胞体近傍に存在する」という記述も誤り。暗反応（炭酸固定）はチラコイドではなく「ストロマ」で行われるため、この記述も誤り。ミトコンドリアと葉緑体はいずれも独自の環状DNAを核とは別に持つという記述が正しい。", "id": "2017_102_170475d7"}, {"year": "2017", "field": "細胞", "q": "以下の記述のうち誤っているものを1つ選びなさい。", "choices": ["接着結合ではクローディン、オクルディンという膜貫通タンパク質が機能して、細胞を接着する。", "ギャップ結合ではコネクソンが細胞どうしを連結する。", "フィブロネクチンはアルギニン―グリシン―アスパラギン酸の繰り返し構造を持つ。", "インテグリン分子は、細胞接着の際に、細胞膜の1箇所に多数集積するが、これをフォーカルアドヒージョンという。"], "answer": [0], "explain": "クローディン・オクルディンが機能するのは「密着結合（タイトジャンクション）」であり、「接着結合（アドヘレンスジャンクション）」ではカドヘリンが機能するため、この記述が誤り。ギャップ結合とコネクソンについての記述、フィブロネクチンの構造についての記述、フォーカルアドヒージョンについての記述はいずれも正しい。", "id": "2017_103_b43552ec"}, {"year": "2017", "field": "代謝", "q": "誤っているものを1つ選びなさい。", "choices": ["解糖系は酸素の有無に関わらず働く。", "解糖系の代謝は、赤血球や腎髄質の活動に不可欠である。", "嫌気的条件下での代謝として、乳酸発酵、アルコール発酵がある。", "TCA回路では、解糖系によって産生されたピルビン酸が酢酸に完全酸化される。"], "answer": [3], "explain": "TCA回路においてピルビン酸（アセチルCoAを経て）は最終的に「二酸化炭素」に完全酸化されるのであり、「酢酸に完全酸化される」という記述は誤り。解糖系が酸素の有無に関わらず働くという記述、赤血球・腎髄質と解糖系についての記述、嫌気的条件下での発酵についての記述はいずれも正しい（赤血球はミトコンドリアを持たないため解糖系に依存する代表例）。", "id": "2017_104_edbb87e6"}, {"year": "2017", "field": "代謝", "q": "正しいものを1つ選びなさい。", "choices": ["TCA回路では、FADH2がピルビン酸1分子から4つ生じる。", "NADHとFADH2では後者の方が酸化によって得られるエネルギーが大きい。", "電子伝達系が作り上げたミトコンドリア内膜の両側にできたプロトン勾配によって、プロトンはマトリックス側へ流入する。", "解糖系の不可逆反応をつかさどる酵素の1つであるホスホフルクトキナーゼは、エネルギー状態が低いと不活性化する。"], "answer": [2], "explain": "TCA回路ではピルビン酸1分子（アセチルCoA1分子）あたりFADH2は1つ生じるため、「4つ生じる」という記述は誤り。NADHの方がFADH2よりも酸化により得られるATP収量が大きいため、「FADH2の方がエネルギーが大きい」という記述は逆で誤り。ホスホフルクトキナーゼはATPなどエネルギー状態が低いとむしろ「活性化」されるため、「不活性化する」という記述も逆で誤り。電子伝達系で生じたプロトン勾配により、プロトンは膜間腔からマトリックス側へATP合成酵素を通って流入するという記述が正しい。", "id": "2017_105_cb8f95a2"}, {"year": "2017", "field": "生殖", "q": "正しいものを1つ選びなさい。", "choices": ["遺伝子組み換えは第二減数分裂において、相同染色体が分離すると同時に起こる。", "精細管においてテストステロンは生殖細胞を支持するセルトリ細胞から分泌される。", "2回の減数分裂において、合計4個の卵ができる。", "精子の運動エネルギーはミトコンドリアの集合したミトコンドリア鞘から供給される。"], "answer": [3], "explain": "組み換え（乗り換え）は「第一」減数分裂において相同染色体が対合・交叉する際に起こるため、「第二減数分裂において起こる」という記述は誤り。テストステロンを分泌するのは精巣の間質にある「ライディッヒ細胞」であり、セルトリ細胞は精子形成を支持する別の細胞なので、この記述も誤り。ヒトの卵形成では2回の減数分裂を経ても最終的に成熟する卵子は1個のみで、残りは極体として放出されるため、「合計4個の卵ができる」という記述も誤り。精子の中片部に集まったミトコンドリア（ミトコンドリア鞘）が精子の運動に必要なATPを供給するという記述が正しい。", "id": "2017_106_68244d81"}, {"year": "2017", "field": "発生", "q": "誤っているものを1つ選びなさい。", "choices": ["中耳、肺、消化管は内胚葉から、皮膚は外胚葉から生じる。", "中胚葉から形成される眼杯は表皮に働きかけ角膜、水晶体に分化させ、眼胚自身は網膜となる。", "アンテナペディア、バイソラックスを引き起こす遺伝子群は8つのホメオティック遺伝子からなる。", "アポトーシスが起こると、いかなる場合においても断片化されたDNAが検出される。"], "answer": [0], "explain": "皮膚は表皮（外胚葉由来）と真皮（中胚葉由来）から構成される複合組織であり、「皮膚は外胚葉から生じる」と単純化するのは不正確（表皮のみが外胚葉由来）なため、この記述が誤り。眼杯と表皮の相互作用についての記述、ホメオティック遺伝子群の数についての記述、アポトーシスとDNA断片化についての記述は正しい記述として扱われる（ただし眼杯自体は間脳（外胚葉）由来である点など、専門的には議論の余地がある選択肢も含まれる）。", "id": "2017_107_e733fc4a"}, {"year": "2017", "field": "起源", "q": "誤っているものを1つ選びなさい。", "choices": ["RNAワールド仮説の根拠の一つは、リボザイムの存在である。", "ユーリー・ミラーは当時、原始地球の大気組成と考えられていたメタン、水素、アンモニアから、アミノ酸が生ずることを示した。", "化学合成細菌、光合成細菌は真正細菌である。", "生き残るために、細菌類は増殖速度を最大にする戦略を取ったが、原始真核生物は、外敵から身を守るため、細胞を小型化させる戦略を取った。"], "answer": [3], "explain": "原始真核生物は、栄養（餌となる古細菌など）を細胞内に「取り込む」ため、細胞を「大型化」させる戦略を取ったと考えられている。「外敵から身を守るため細胞を小型化させる戦略を取った」という記述は誤り。RNAワールド仮説とリボザイムについての記述、ユーリー・ミラーの実験についての記述、化学合成細菌・光合成細菌が真正細菌であるという記述はいずれも正しい。", "id": "2017_108_661a70b3"}, {"year": "2017", "field": "進化", "q": "正しいものを1つ選びなさい。", "choices": ["ヒトのミトコンドリアも核のDNAと同程度の割合のイントロン領域を含む。", "ミトコンドリアは、母性遺伝であり、また、ミトコンドリアのDNAにおいて、全ての人が同じ遺伝情報を有する。", "ヘッケルの反復説によると「系統発生は個体発生を繰り返す」", "ヘテロクロニーとは発生のタイムテーブルの変化による進化、ヘテロメトリーとは遺伝子量の変化による進化である。"], "answer": [3], "explain": "ヒトのミトコンドリアDNAは遺伝子が密に並んでおりイントロン領域をほとんど含まないため、「核DNAと同程度の割合のイントロン領域を含む」という記述は誤り。ミトコンドリアDNAは母性遺伝するが、突然変異により父方とは異なる出自を持つミトコンドリアが混在する場合（ヘテロプラスミー）もあり、「全ての人が同じ遺伝情報を有する」というのは誤り。ヘッケルの反復説は「個体発生は系統発生を繰り返す」という主張であり、「系統発生は個体発生を繰り返す」は主客が逆で誤り。ヘテロクロニーとヘテロメトリーの定義についての記述が正しい。", "id": "2017_109_481041e0"}, {"year": "2017", "field": "遺伝子工学", "q": "誤っているものを1つ選ぶ。", "choices": ["プレプロインスリンはゴルジ体で合成される。", "インスリンは2本のジスルフィド結合を有する。", "インスリンを合成する手段の一つに大腸菌を使用する方法がある。", "カルタヘナ議定書に先立ってアシロマ会議が開かれた。"], "answer": [0], "explain": "プレプロインスリンは「小胞体（粗面小胞体）」で合成されるため、「ゴルジ体で合成される」という記述が誤り。プロインスリンへの成熟過程でゴルジ体が関わるが、最初の合成の場は小胞体である。インスリンのジスルフィド結合についての記述、大腸菌を使った合成方法についての記述、アシロマ会議についての記述はいずれも正しい。", "id": "2017_110_e8896c9d"}, {"year": "2017", "field": "遺伝子工学", "q": "誤っているものをすべて選びなさい。", "choices": ["制限酵素はDNAエクソヌクレアーゼの一種である。", "Ⅱ型の制限酵素は、認識部位ないしはその近傍のDNAを切断する。", "HindⅢはインフルエンザ菌から発見された酵素で、DNAの回文構造を切断する。", "RNA干渉法を使えば、遺伝子機能を付加・改変することができる。"], "answer": [0, 3], "explain": "制限酵素はDNA鎖の内部を切断する酵素であり「エンドヌクレアーゼ」の一種であるため、「DNAエクソヌクレアーゼの一種である」という記述は誤り（末端から分解するエキソヌクレアーゼではない）。RNA干渉（RNAi）は標的mRNAを分解するなどして遺伝子発現を「抑制・減少」させる技術であり、機能を「付加・改変」するものではないため、この記述も誤り。Ⅱ型制限酵素についての記述、HindIIIについての記述は正しい。", "id": "2017_111_c6fc4e32"}, {"year": "2017", "field": "発酵", "q": "正しいものを1つ選ぶ。", "choices": ["コベルト・コッホにより、ペニシリンが発見された。", "アミノ酸発酵、有機酸発酵、核酸発酵、ビタミン発酵は全て好気状態で行われる。", "ワインは単行複発酵で行われる。", "ビール酵母のアルコール発酵について、上面発酵酵母は低温、長時間で発酵を行う。"], "answer": [1], "explain": "ペニシリンを発見したのはアレクサンダー・フレミングであり、コッホではないため、この記述は誤り。ワインは原料であるブドウにすでに糖が含まれているため糖化の工程が不要な「単発酵」で行われるため、「単行複発酵で行われる」という記述も誤り。上面発酵酵母は「高温・短時間」で発酵を行うため、「低温、長時間で発酵を行う」という記述も逆で誤り。アミノ酸発酵・有機酸発酵・核酸発酵・ビタミン発酵が一般に好気的な条件で行われる工業的発酵であるという記述が正しい。", "id": "2017_112_15e8aa02"}, {"year": "2017", "field": "発酵", "q": "誤っているものを1つ選ぶ。", "choices": ["チーズはスターターにレンネットを加え、カードとホエイに分離、その後カードを発酵、熟成させることによって作られる。", "マッコリ、紹興酒はいずれも日本酒と同じ並行複発酵によって造られている。", "ヨーグルトを作るうえで通常2種類のホモ型乳酸菌が使用されるが、この代表的なものはサーモフィルス菌、ブルガリア菌である。", "リジン発酵ではホモセリンの合成経路を遮断し、またアスパルトキナーゼへのフィードバック阻害が欠かせない。"], "answer": [3], "explain": "リジン発酵では、ホモセリン合成経路の遮断に加え、アスパルトキナーゼへのフィードバック阻害の「解除（阻害されない変異株を用いる）」が必要であるため、「フィードバック阻害が欠かせない」という記述は逆の意味になり誤り。チーズの製造工程についての記述、マッコリ・紹興酒の並行複発酵についての記述、ヨーグルトの乳酸菌についての記述はいずれも正しい。", "id": "2017_113_e1e5cb89"}, {"year": "2017", "field": "バイオ技術", "q": "正しいものを1つ選ぶ。", "choices": ["除草剤の1種であるグリホサートは放線菌が生産する抗生物質である。", "Btタンパク質は、消化器官がアルカリ性の時に無毒化する。", "遺伝子組み換えでないと記載されている商品に遺伝子組み換え食品は全く入っていない。", "アグロバクテリウム法とは土の中に生息する細菌の1種であるアグロバクテリウムの、植物に感染し、自らの遺伝子を移動させる性質を用いた遺伝子導入の方法である。"], "answer": [3], "explain": "除草剤耐性に関わるのはグリホサートではなくグルホシネートが放線菌由来の抗生物質として知られるため、この記述は誤り。Btタンパク質は「酸性」条件下（昆虫のアルカリ性の消化管では活性化するが、哺乳類などの酸性の胃では分解・無毒化される）で無毒化されるため、「アルカリ性の時に無毒化する」という記述も誤り。「遺伝子組み換えでない」表示は、上位3位以内かつ5%以上という基準を満たさない場合に可能であり、微量の混入まで完全に排除することを意味しないため、この記述も誤り。アグロバクテリウム法についての記述が正しい。", "id": "2017_114_a822630e"}, {"year": "2017", "field": "生態系", "q": "正しいものを1つ選ぶ", "choices": ["生態系とは同じ場所で生きている様々な生物種の個体群の集まりのことである。", "ペニシリンは、細菌類が生み出す物質がアオカビの繁殖を防ぐという片害作用からできる。", "栄養段階が大きくなると、個体数は多くなっていく。", "根粒菌、アゾトバクター、クロストリジウムは窒素固定細菌である。"], "answer": [3], "explain": "生態系は生物群集（個体群の集まり）に加え、それを取り巻く「非生物的環境」も含めた統一システムを指すため、個体群の集まりのみという記述は不十分で誤り。ペニシリンはアオカビ（青カビ）が生み出す物質が「細菌」の増殖を防ぐという片害作用によるものであり、主客が逆なので、この記述も誤り。栄養段階が高くなるほど一般に個体数は「少なく」なるため、「多くなっていく」という記述も誤り。根粒菌・アゾトバクター・クロストリジウムが窒素固定細菌であるという記述が正しい。", "id": "2017_115_043be3f9"}, {"year": "2017", "field": "環境", "q": "誤っているものを1つ選ぶ。", "choices": ["親水性が高い物質は生物濃縮が起こりやすい。", "活性汚泥法は好気性酸化であり、有機物を二酸化炭素として放出することで浄化を図る。", "脱窒とは、硝化によって酸化された窒素成分を、大気にN2として放出することである。", "バイオスティミュレーションとは栄養源等を汚染現場に注入することで、自浄作用を人為的にアシストし高める操作である。"], "answer": [0], "explain": "生物濃縮が起こりやすいのは「疎水性（脂溶性）」が高い物質であり、体内の脂肪組織などに蓄積しやすいためであるため、「親水性が高い物質は生物濃縮が起こりやすい」という記述は誤り。活性汚泥法についての記述、脱窒の定義についての記述、バイオスティミュレーションの定義についての記述はいずれも正しい。", "id": "2017_116_8dec6b26"}, {"year": "2017", "field": "エネルギー", "q": "誤っているものを1つ選ぶ。", "choices": ["世界のエネルギー消費量のトップ3は石油、石炭、天然ガスの化石燃料である。", "メタンハイドレートには高温下で熱によって有機物のカルボキシル基が除去されてできる非生物起源のものがある。", "ウランは海水中にも存在しているが、エネルギーとしての利用には技術的問題がある。", "再生可能エネルギーの優れた点は、枯渇しないことに加え、供給が安定していることである。"], "answer": [3], "explain": "再生可能エネルギー（太陽光・風力など）は資源が枯渇しないという利点がある一方、天候などに左右され「供給が不安定」であるという課題があるため、「供給が安定していることである」という記述が誤り。世界のエネルギー消費量トップ3についての記述、非生物起源メタンハイドレートについての記述、ウランと海水についての記述はいずれも正しい。", "id": "2017_117_f6278104"}, {"year": "2017", "field": "バイオ技術", "q": "正しいものを1つ選ぶ。", "choices": ["ケミカルリファイナリーは人工的に合成した化学物質から製品を作る技術、バイオリファイナリーとはバイオマスを原料とした製品づくりのための技術である。", "1,4-ブタンジオールとコハク酸のホモポリマーは生分解性プラスチックとして既に実用化されている。", "珪藻、緑藻では油脂植物よりも高濃度に油脂生産をすることができ、また収穫できる回数も多い。", "酵母は遺伝子組み換え等を行わなければ、植物非食部しか発酵に利用できない。"], "answer": [1], "explain": "ケミカルリファイナリーは本来「石油」を原料とした製品作りの技術を指し、「人工的に合成した化学物質から製品を作る技術」という説明は不正確なため誤り。珪藻・緑藻は収穫回数は多いものの、油脂含有量（濃度）は必ずしも従来の油脂植物より高いとは限らないため、この記述も誤り。酵母は遺伝子組み換えなしでも植物の「可食部（デンプンや糖）」を発酵に利用できるため、「植物非食部しか発酵に利用できない」という記述も誤り（記述が逆）。1,4-ブタンジオールとコハク酸から合成されるポリマーが生分解性プラスチックとして実用化されているという記述が正しい。", "id": "2017_118_30128ba3"}, {"year": "2017", "field": "配列解析", "q": "正しいものをすべて選ぶ。", "choices": ["エマルジョンPCR法では、油相を内包したエマルジョン内にDNA1分子、プライマーを固定化したビーズ1つが入るようにし、そこでDNAの増殖を行う。", "イルミナ社の開発したGAでは、平板基板上に無数のDNAを捕捉し、そこで周辺のプライマーを使って、塩基を伸長させることにより、増幅したクラスター状のDNAを得る。", "パイロシークエンス法はDNAポリメラーゼによる塩基伸長反応を基本とし、ルシフェラーゼの発光ピークパターンから塩基配列を特定する。", "ナノポア技術は電圧をかけたナノサイズの穴に、DNA断片が通る時に流れるイオン電流の微小な差を検出することによって、DNA配列を決定する。"], "answer": [2, 3], "explain": "エマルジョンPCR法では「水相」を内包したエマルジョン（水中油型）内にDNA1分子とビーズが入るようにして増幅するため、「油相を内包したエマルジョン」という記述は誤り。イルミナ社のGAでは平板基板上に「1分子」のDNAを捕捉しクラスターを形成するため、「無数のDNAを捕捉する」という記述も誤り（最初は1分子から始まる）。パイロシークエンス法についての記述、ナノポア技術についての記述はいずれも正しい。", "id": "2017_119_f36413e8"}, {"year": "2017", "field": "配列解析", "q": "誤っているものを1つ選ぶ。", "choices": ["DNAマイクロアレイでは、DNAを基盤に、マイクロサイズのくぼみへの導入、吸引力もしくは、DNAが接着しやすい高分子ポリマーなどで接着固定する。", "マイクロドロップレットを作成するマイクロ流体デバイスはシリコンから成り、フォトリソグラフィ、シリコンドライエッチングからなる。", "リアルタイムPCR法では、単一コピーのDNA分子を導入、増殖し、増幅が確認されたパーティションを確認することで定量的にDNA分子を定量する。", "細胞解析の手法の1つであるセルアナライザーでは細胞を分取せずに、レーザー光を当て、前方散乱から細胞の大きさ、側方散乱から複雑さを検出する。"], "answer": [0], "explain": "「DNAマイクロアレイでは、DNAを基盤に…接着固定する」という記述は、実際には「細胞マイクロアレイ」についての説明（細胞を基盤に固定する）であり、DNAマイクロアレイの説明としては不正確（DNAマイクロアレイはDNAプローブを基盤に固定するもので、記述内容が混同されている）。マイクロ流体デバイスについての記述、リアルタイムPCR法についての記述、セルアナライザーについての記述はいずれも正しい。", "id": "2017_120_247522d6"}, {"year": "2017", "field": "疾患", "q": "誤っているものを1つ選ぶ。", "choices": ["がんでは、正常だった1個の細胞が遺伝子の突然変異により、増殖の制御が効かなくなり、分裂を繰り返し、腫瘤を形成する。", "抗生物質の登場によって、結核の罹患率は大幅に減少した。", "大腸がんは、近年増加傾向にある一方、胃がんの死亡率は減少傾向にある。", "パピローマウイルスは子宮頸がんを発症させる。"], "answer": [1], "explain": "抗生物質の登場によって大幅に減少したのは結核の「死亡率」であり、「罹患率」という表現は不正確とされる（罹患率の低下には公衆衛生・ワクチンなど複合的な要因が関わる）ため、この記述が誤り。がんの発生機序についての記述、大腸がん・胃がんの傾向についての記述、パピローマウイルスと子宮頸がんについての記述はいずれも正しい。", "id": "2017_121_1d3a1a67"}, {"year": "2017", "field": "疾患", "q": "誤っているものを1つ選ぶ。", "choices": ["がん細胞は血管新生能という性質を有し、腫瘤の中に酸素と栄養を運ぶ血管網が形成されなければ、大きな腫瘍は形成されない。", "糖尿病には1型、2型があり、前者はインスリンを産生する膵臓β細胞が破壊されてしまうことによって、後者は、細胞のインスリンへの反応性が悪くなることに起因し、日本人の罹患率は2型のものが多い。", "日和見感染とは、免疫力が低下することによって、普通なら無症状であるような感染症が重篤な症状を呈することである。", "HIVウイルスは宿主細胞を利用して、自身のDNAをRNAに転写、タンパク質に翻訳し、ウイルス粒子を構成することで増殖する。"], "answer": [3], "explain": "HIVはレトロウイルスであり、自身の「RNA」を「DNA」に「逆転写」した上で宿主ゲノムに組み込み、タンパク質に翻訳してウイルス粒子を構成する。「自身のDNAをRNAに転写する」という記述は方向・分子の種類が逆になっており誤り。がん細胞の血管新生能についての記述、糖尿病の1型・2型についての記述、日和見感染の定義についての記述はいずれも正しい。", "id": "2017_122_8ed61ded"}, {"year": "2017", "field": "ゲノム", "q": "正しいものを1つ選びなさい。", "choices": ["ヒトのゲノムの約50%は反復配列であり、たんぱく質をコードする領域であるイントロンはわずかに1.5%程度である。", "ヒトのゲノムの配列には0.1%程度の個人差があり、主なものは一塩基多型(SNP)である。", "1つの遺伝子から転写されるmRNAはただ一つである。", "マイクロRNAは2,3,4塩基の繰り返し配列の多型で、繰り返し数の種類が多いことから遺伝性疾患の原因遺伝子の探索等に使用される。"], "answer": [1], "explain": "タンパク質をコードする領域は「エクソン」であり「イントロン」ではないため、この用語の取り違えが誤り。選択的スプライシングにより1つの遺伝子から複数種類のmRNA（したがって複数種のタンパク質）が転写・翻訳され得るため、「1つの遺伝子から転写されるmRNAはただ一つ」という記述も誤り。2〜4塩基の繰り返し配列の多型は「マイクロサテライト」と呼ばれ、マイクロRNA（miRNA）とは別の概念なので、この記述も誤り。ヒトゲノムの個人差とSNPについての記述が正しい。", "id": "2017_123_b046b0f6"}, {"year": "2017", "field": "ゲノム・医療", "q": "誤っているものを1つ選びなさい。", "choices": ["トランスクリプトームはどの遺伝子に異常があるか、どの遺伝子が多く（少なく）発現しているかを調べ、乳がんの解析等に利用されている。", "パーソナルゲノムの解析を行うことによって、個人の病気のなりやすさ、薬の効きやすさを分析し、患者ひとりひとりにベストな処方を提供できる。", "ゲノムの違いが起こる頻度が1%未満の場合は多型、以上の場合は変異と呼ばれる。", "たんぱく質の総体の解析を行う分野をプロテオームという。"], "answer": [2], "explain": "多型・変異の定義は逆であり、正しくは「頻度が1%未満の場合は変異（ミューテーション）、1%以上の場合は多型（ポリモーフィズム）」と呼ばれるため、この記述が誤り。トランスクリプトームについての記述、パーソナルゲノム解析についての記述、プロテオームについての記述はいずれも正しい。", "id": "2017_124_8a4a5571"}, {"year": "2017", "field": "医薬", "q": "誤っているものを1つ選びなさい。", "choices": ["薬物には薬物標的部位に直接作用するものと、神経細胞等を通して間接的に作用するものがあり、前者について、薬物標的部位の機能を高めるものは作動薬、弱めるものは拮抗薬という。", "血液のうち、80％は血漿成分、20％は血球成分であり、これらは製剤として使用されるが、その利用には感染症、安全性、品質管理が課題である", "モノクローナル抗体を利用した抗体医薬には、抗原である毒素と特異的に結合し中和するものや、また抗原に結合してマクロファージによって貧食されやすくするなど様々な種類がある。", "抗体医薬はファージディスプレー法によって、大腸菌の増殖を利用し、開発される。"], "answer": [1], "explain": "血液の成分比率は、一般に血漿成分が約55%、血球成分が約45%とされ、「80%対20%」という数値は不正確なため、この記述が誤り。薬物の作動薬・拮抗薬についての記述、モノクローナル抗体についての記述、ファージディスプレー法についての記述はいずれも正しい（作動薬＝アゴニスト、拮抗薬＝アンタゴニストの定義も正しい）。", "id": "2017_125_8563a31a"}, {"year": "2017", "field": "医薬", "q": "誤っているものを1つ選ぶ。", "choices": ["白血病は造血幹細胞が異常となり、特定の白血球を増殖して起こる病気であり、治療法としては、放射線を照射し、造血幹細胞を殺し、さらに、骨髄を移植し、新しい造血幹細胞を入れる。", "iPS細胞やES細胞は、様々な細胞に分化する可能性を秘めているが、一方で拒絶反応のリスクもある。", "DDSでは、リポソームに細胞内へ薬物を運搬させるが、pH応答性リポソームはpHが上がると、エンドソーム膜と融合する。", "100 nm～10 nm程度のサイズの高分子や薬物キャリアはがん組織に集積しやすいが、これをEPR効果と呼ぶ。"], "answer": [2], "explain": "pH応答性リポソームは、エンドソーム内のpHが「低下（酸性化）」した際にエンドソーム膜と融合し、内容物を細胞質に放出する設計が一般的であるため、「pHが上がると融合する」という記述は逆で誤り。白血病の治療法についての記述、iPS細胞・ES細胞と拒絶反応についての記述、EPR効果についての記述はいずれも正しい。", "id": "2017_126_02ff38fd"}]
