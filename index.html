<script>
(function () {
  "use strict";

  const QUESTIONS = JSON.parse(document.getElementById("questions-data").textContent);
  const LETTERS = ["A", "B", "C", "D", "E", "F"];
  const STORAGE_KEY = "seimeikagaku_quiz_stats_v1";

  // ---------- Storage ----------
  function loadStats() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : {};
    } catch (e) {
      return {};
    }
  }
  function saveStats(stats) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(stats));
    } catch (e) { /* ignore quota errors */ }
  }
  function recordAnswer(qid, correct) {
    const stats = loadStats();
    if (!stats[qid]) stats[qid] = { correct: 0, wrong: 0, lastSeen: 0 };
    if (correct) stats[qid].correct += 1; else stats[qid].wrong += 1;
    stats[qid].lastSeen = Date.now();
    saveStats(stats);
  }

  // ---------- Utilities ----------
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function buildShuffledQuestion(q) {
    const order = shuffle(q.choices.map((_, i) => i));
    const choices = order.map((origIdx) => q.choices[origIdx]);
    const answerSet = new Set(q.answer);
    const answer = order
      .map((origIdx, newIdx) => (answerSet.has(origIdx) ? newIdx : -1))
      .filter((x) => x !== -1);
    return Object.assign({}, q, { choices, answer });
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // ---------- App state ----------
  let state = {
    phase: "setup", // setup | quiz | result | stats
    deck: [],
    pos: 0,
    selected: [],
    revealed: false,
    log: [],
    numQuestions: 25,
    fieldFilter: "__all__",
    weakOnly: false,
  };

  const allFields = Array.from(new Set(QUESTIONS.map((q) => q.field))).sort();

  function availableCount(fieldFilter) {
    if (fieldFilter === "__all__") return QUESTIONS.length;
    return QUESTIONS.filter((q) => q.field === fieldFilter).length;
  }

  function weakQuestionIds(stats, threshold) {
    // "weak" = wrong count > correct count, or wrong >= 2 and never answered correctly more than wrong
    const ids = [];
    for (const qid in stats) {
      const s = stats[qid];
      if (s.wrong > 0 && s.wrong >= s.correct) ids.push(qid);
    }
    return new Set(ids);
  }

  function render() {
    const app = document.getElementById("app");
    if (state.phase === "setup") app.innerHTML = renderSetup();
    else if (state.phase === "quiz") app.innerHTML = renderQuiz();
    else if (state.phase === "result") app.innerHTML = renderResult();
    else if (state.phase === "stats") app.innerHTML = renderStats();
    attachHandlers();
  }

  // ---------- Setup screen ----------
  function renderSetup() {
    const stats = loadStats();
    const weakIds = weakQuestionIds(stats);
    const weakCount = QUESTIONS.filter((q) => weakIds.has(q.id)).length;
    const avail = state.weakOnly ? weakCount : availableCount(state.fieldFilter);
    const numOptions = Array.from(new Set([10, 25, 50, avail])).filter((n) => n > 0);

    const fieldChips = [
      `<button class="chip ${state.fieldFilter === "__all__" && !state.weakOnly ? "active" : ""}" data-action="set-field" data-field="__all__">すべて（${QUESTIONS.length}問）</button>`,
    ]
      .concat(
        allFields.map(
          (f) =>
            `<button class="chip ${state.fieldFilter === f && !state.weakOnly ? "active" : ""}" data-action="set-field" data-field="${escapeHtml(f)}">${escapeHtml(f)}</button>`
        )
      )
      .join("");

    const numChips = numOptions
      .map((n) => {
        const isAvailAll = n === avail;
        const active = state.numQuestions === n || (isAvailAll && state.numQuestions > avail);
        return `<button class="num-chip ${active ? "active" : ""}" data-action="set-num" data-num="${n}">${isAvailAll ? `全問 (${n})` : `${n}問`}</button>`;
      })
      .join("");

    const weakButtonLabel = weakCount > 0 ? `苦手問題だけ演習（${weakCount}問）` : "苦手問題だけ演習（記録なし）";

    return `
      <div class="masthead">
        <div class="masthead-line"></div>
        <div class="eyebrow">WASEDA · BIOLOGY PAST-PAPER DRILL</div>
        <h1>生命科学概論 A</h1>
        <div class="subtitle">期末試験 演習問題集　2009 / 2010 / 2017 / 2018 / 2019 / 2021</div>
        <div class="masthead-line"></div>
      </div>

      <div class="card">
        <div class="setup-section">
          <div class="setup-label">出題分野</div>
          <div class="chip-grid">${fieldChips}</div>
        </div>

        <div class="setup-section">
          <div class="setup-label">出題数（全${avail}問中）</div>
          <div class="num-grid">${numChips}</div>
        </div>

        <button class="btn-primary" data-action="start">
          <span>試験開始</span><span>→</span>
        </button>

        <button class="btn-ghost" style="width:100%; margin-top:10px;" data-action="toggle-weak">
          ${state.weakOnly ? "✓ " : ""}${weakButtonLabel}
        </button>
      </div>

      <div class="stats-link-row">
        <button class="btn-ghost" data-action="goto-stats">📊 成績・苦手問題を見る</button>
        <button class="btn-ghost" data-action="reset-stats">記録をリセット</button>
      </div>

      <div class="foot-note">
        過去問6年分（2009・2010×3・2017予想問題・2018・2019×2・2021再現）より抜粋・改題　全${QUESTIONS.length}問収録<br>
        記録はこのブラウザ（このデバイス）だけに保存されます。
      </div>
    `;
  }

  // ---------- Quiz screen ----------
  function renderQuiz() {
    const current = state.deck[state.pos];
    const isMulti = current.answer.length !== 1;
    const correctSet = new Set(current.answer);

    const choiceRows = current.choices
      .map((c, i) => {
        const isSelected = state.selected.includes(i);
        const isCorrectChoice = correctSet.has(i);
        let rowClass = "";
        let bubbleClass = "";
        let mark = "";
        if (state.revealed) {
          if (isCorrectChoice) { rowClass = "correct"; bubbleClass = "b-correct"; mark = '<span class="check-mark">✓</span>'; }
          else if (isSelected && !isCorrectChoice) { rowClass = "wrong"; bubbleClass = "b-wrong"; mark = '<span class="x-mark">✕</span>'; }
          else { rowClass = "muted"; }
        } else if (isSelected) {
          rowClass = "selected"; bubbleClass = "b-selected";
        }
        const bubbleShape = isMulti ? "square" : "round";
        return `
          <button class="choice-row ${rowClass}" data-action="toggle-choice" data-idx="${i}" ${state.revealed ? "disabled" : ""}>
            <span class="bubble ${bubbleShape} ${bubbleClass}">${LETTERS[i]}</span>
            <span class="choice-text">${escapeHtml(c)}</span>
            ${mark}
          </button>
        `;
      })
      .join("");

    const explainBlock = state.revealed
      ? `<div class="explain-box">
          <div class="explain-label">解説</div>
          <div class="explain-text">${escapeHtml(current.explain)}</div>
        </div>`
      : "";

    const actionButton = !state.revealed
      ? `<button class="btn-secondary" data-action="check-answer" ${state.selected.length === 0 ? "disabled" : ""}>解答する</button>`
      : `<button class="btn-secondary" data-action="next-question">${state.pos + 1 >= state.deck.length ? "結果を見る" : "次の問題"} →</button>`;

    const correctCount = state.log.filter((l) => l.correct).length;

    return `
      <div class="progress-bar">
        <div class="progress-track">
          <div class="progress-fill" style="width: ${((state.pos + (state.revealed ? 1 : 0)) / state.deck.length) * 100}%"></div>
        </div>
        <div class="progress-meta">
          <span class="progress-num">${String(state.pos + 1).padStart(2, "0")} / ${String(state.deck.length).padStart(2, "0")}</span>
          <span>正答 ${correctCount}</span>
        </div>
      </div>

      <div class="card">
        <div class="q-tags">
          <span class="tag-year">${escapeHtml(current.year)}</span>
          <span class="tag-field">${escapeHtml(current.field)}</span>
          ${isMulti ? `<span class="tag-multi">複数選択（${current.answer.length}つ）</span>` : ""}
        </div>

        <div class="q-text">${escapeHtml(current.q)}</div>

        <div class="choice-list">${choiceRows}</div>

        ${explainBlock}

        <div class="action-row">${actionButton}</div>
      </div>
    `;
  }

  // ---------- Result screen ----------
  function renderResult() {
    const correct = state.log.filter((l) => l.correct).length;
    const total = state.deck.length;
    const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
    const wrongLog = state.log.filter((l) => !l.correct);

    let grade = "不可", gradeClass = "grade-d";
    if (pct >= 85) { grade = "優"; gradeClass = "grade-a"; }
    else if (pct >= 70) { grade = "良"; gradeClass = "grade-b"; }
    else if (pct >= 60) { grade = "可"; gradeClass = "grade-c"; }

    let reviewHtml;
    if (wrongLog.length > 0) {
      const cards = wrongLog
        .map((l) => {
          const answerText = l.q.answer.map((a) => `${LETTERS[a]}. ${l.q.choices[a]}`).join(" / ");
          return `
            <div class="review-card">
              <div class="q-tags">
                <span class="tag-year">${escapeHtml(l.q.year)}</span>
                <span class="tag-field">${escapeHtml(l.q.field)}</span>
              </div>
              <div class="review-q">${escapeHtml(l.q.q)}</div>
              <div class="review-answer">
                <div class="explain-label" style="color: var(--sage);">正解</div>
                <div>${escapeHtml(answerText)}</div>
              </div>
              <div class="explain-box">
                <div class="explain-label">解説</div>
                <div class="explain-text">${escapeHtml(l.q.explain)}</div>
              </div>
            </div>
          `;
        })
        .join("");
      reviewHtml = `
        <div class="review-section">
          <div class="review-label">間違えた問題（${wrongLog.length}問）の復習</div>
          ${cards}
        </div>
      `;
    } else {
      reviewHtml = `<div class="perfect-box">全問正解です。お見事。</div>`;
    }

    return `
      <div class="result-header">
        <div class="eyebrow">採点結果</div>
        <div class="result-score-row">
          <span class="result-score-big">${correct}</span>
          <span class="result-score-slash">/ ${total}</span>
        </div>
        <div class="result-grade ${gradeClass}">${grade}　${pct}%</div>
      </div>

      ${reviewHtml}

      <div class="top-actions" style="justify-content:center; gap:10px;">
        <button class="btn-primary" style="width:auto; padding:12px 28px;" data-action="restart">
          <span>もう一度挑戦する</span><span>→</span>
        </button>
        <button class="btn-ghost" data-action="goto-stats">📊 成績を見る</button>
      </div>
    `;
  }

  // ---------- Stats screen ----------
  function renderStats() {
    const stats = loadStats();
    const qMap = {};
    QUESTIONS.forEach((q) => (qMap[q.id] = q));

    const seenIds = Object.keys(stats).filter((id) => qMap[id]);
    const totalAnswered = seenIds.reduce((sum, id) => sum + stats[id].correct + stats[id].wrong, 0);
    const totalCorrect = seenIds.reduce((sum, id) => sum + stats[id].correct, 0);
    const overallPct = totalAnswered > 0 ? Math.round((totalCorrect / totalAnswered) * 100) : 0;

    const rows = seenIds
      .map((id) => {
        const s = stats[id];
        const q = qMap[id];
        const attempts = s.correct + s.wrong;
        const pct = attempts > 0 ? Math.round((s.correct / attempts) * 100) : 0;
        return { id, q, s, attempts, pct };
      })
      .sort((a, b) => a.pct - b.pct || b.attempts - a.attempts);

    if (rows.length === 0) {
      return `
        <div class="top-actions">
          <button class="btn-ghost" data-action="goto-setup">← 戻る</button>
        </div>
        <div class="masthead">
          <div class="eyebrow">MY RECORD</div>
          <h1 style="font-size:26px;">成績・苦手問題</h1>
        </div>
        <div class="empty-state">
          まだ記録がありません。<br>
          クイズに挑戦すると、問題ごとの正答・誤答がここに蓄積されていきます。
        </div>
      `;
    }

    const weakRows = rows.filter((r) => r.s.wrong > 0 && r.s.wrong >= r.s.correct);
    const strongRows = rows.filter((r) => !(r.s.wrong > 0 && r.s.wrong >= r.s.correct));

    function barColor(pct) {
      if (pct >= 80) return "var(--sage)";
      if (pct >= 50) return "var(--gold)";
      return "var(--coral)";
    }

    function renderRow(r) {
      return `
        <div class="stat-row">
          <div class="stat-row-text">
            <span class="tag-year" style="margin-right:6px;">${escapeHtml(r.q.year)}</span>
            <span class="tag-field" style="margin-right:6px;">${escapeHtml(r.q.field)}</span>
            <div style="margin-top:6px;">${escapeHtml(r.q.q.length > 60 ? r.q.q.slice(0, 60) + "…" : r.q.q)}</div>
          </div>
          <div class="stat-row-meta">
            <div>${r.s.correct}正 / ${r.s.wrong}誤</div>
            <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${r.pct}%; background:${barColor(r.pct)};"></div></div>
          </div>
        </div>
      `;
    }

    const weakHtml = weakRows.length
      ? `<div class="review-label" style="margin-top:24px;">苦手な問題（${weakRows.length}問）</div>` + weakRows.map(renderRow).join("")
      : "";
    const strongHtml = strongRows.length
      ? `<div class="review-label" style="margin-top:24px;">その他の演習済み問題（${strongRows.length}問）</div>` + strongRows.map(renderRow).join("")
      : "";

    return `
      <div class="top-actions">
        <button class="btn-ghost" data-action="goto-setup">← 戻る</button>
      </div>
      <div class="masthead" style="margin-bottom:20px;">
        <div class="eyebrow">MY RECORD</div>
        <h1 style="font-size:26px;">成績・苦手問題</h1>
      </div>

      <div class="stats-summary">
        <div class="stats-box">
          <div class="stats-box-num">${seenIds.length}</div>
          <div class="stats-box-label">演習した問題数</div>
        </div>
        <div class="stats-box">
          <div class="stats-box-num">${totalAnswered}</div>
          <div class="stats-box-label">総解答回数</div>
        </div>
        <div class="stats-box">
          <div class="stats-box-num">${overallPct}%</div>
          <div class="stats-box-label">通算正答率</div>
        </div>
      </div>

      ${weakHtml}
      ${strongHtml}
    `;
  }

  // ---------- Actions ----------
  function startQuiz() {
    const stats = loadStats();
    let pool;
    if (state.weakOnly) {
      const weakIds = weakQuestionIds(stats);
      pool = QUESTIONS.filter((q) => weakIds.has(q.id));
      if (pool.length === 0) pool = QUESTIONS.slice();
    } else if (state.fieldFilter !== "__all__") {
      pool = QUESTIONS.filter((q) => q.field === state.fieldFilter);
    } else {
      pool = QUESTIONS.slice();
    }
    const shuffledPool = shuffle(pool);
    const n = Math.min(state.numQuestions, shuffledPool.length);
    state.deck = shuffledPool.slice(0, n).map(buildShuffledQuestion);
    state.pos = 0;
    state.selected = [];
    state.revealed = false;
    state.log = [];
    state.phase = "quiz";
    render();
  }

  function toggleChoice(idx) {
    if (state.revealed) return;
    const current = state.deck[state.pos];
    const isMulti = current.answer.length !== 1;
    if (isMulti) {
      if (state.selected.includes(idx)) {
        state.selected = state.selected.filter((x) => x !== idx);
      } else {
        state.selected = state.selected.concat([idx]).sort((a, b) => a - b);
      }
    } else {
      state.selected = [idx];
    }
    render();
  }

  function checkAnswer() {
    if (state.selected.length === 0) return;
    const current = state.deck[state.pos];
    state.revealed = true;
    const correctSet = new Set(current.answer);
    const selSet = new Set(state.selected);
    const isCorrect = correctSet.size === selSet.size && Array.from(correctSet).every((x) => selSet.has(x));
    state.log.push({ correct: isCorrect, q: current });
    recordAnswer(current.id, isCorrect);
    render();
  }

  function nextQuestion() {
    if (state.pos + 1 >= state.deck.length) {
      state.phase = "result";
    } else {
      state.pos += 1;
      state.selected = [];
      state.revealed = false;
    }
    render();
  }

  function attachHandlers() {
    document.querySelectorAll("[data-action]").forEach((el) => {
      el.addEventListener("click", (e) => {
        const action = el.getAttribute("data-action");
        if (action === "set-field") {
          state.fieldFilter = el.getAttribute("data-field");
          state.weakOnly = false;
          render();
        } else if (action === "set-num") {
          state.numQuestions = parseInt(el.getAttribute("data-num"), 10);
          render();
        } else if (action === "toggle-weak") {
          state.weakOnly = !state.weakOnly;
          render();
        } else if (action === "start") {
          startQuiz();
        } else if (action === "toggle-choice") {
          toggleChoice(parseInt(el.getAttribute("data-idx"), 10));
        } else if (action === "check-answer") {
          checkAnswer();
        } else if (action === "next-question") {
          nextQuestion();
        } else if (action === "restart") {
          state.phase = "setup";
          render();
        } else if (action === "goto-stats") {
          state.phase = "stats";
          render();
        } else if (action === "goto-setup") {
          state.phase = "setup";
          render();
        } else if (action === "reset-stats") {
          if (confirm("このデバイスに保存されている記録をすべて削除します。よろしいですか？")) {
            localStorage.removeItem(STORAGE_KEY);
            render();
          }
        }
      });
    });
  }

  render();
})();
</script>
</body>
</html>
